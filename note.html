<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>LeetCode 解題筆記</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@300;400;500;600;700&display=swap');

:root {
  --bg:#0d1117; --surface:#161b22; --surface2:#1f2937; --border:#30363d;
  --accent:#58a6ff; --green:#3fb950; --yellow:#d29922; --red:#f85149; --purple:#bc8cff;
  --text:#e6edf3; --muted:#8b949e; --dim:#484f58;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;display:flex;flex-direction:column;}

/* HEADER */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;flex-shrink:0;z-index:50;}
.logo{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:var(--accent);}
.logo span{color:var(--muted);font-weight:400;}
.hcontrols{display:flex;gap:8px;flex-wrap:wrap;flex:1;justify-content:flex-end;align-items:center;}
select,input{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:8px;font-size:13px;font-family:inherit;}
select:focus,input:focus{outline:none;border-color:var(--accent);}
input{width:140px;}
.btn{padding:7px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s;}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn.on{background:var(--accent);border-color:var(--accent);color:#000;font-weight:600;}

/* STATS */
.statsbar{background:var(--surface);border-bottom:1px solid var(--border);padding:7px 16px;display:flex;gap:16px;align-items:center;flex-shrink:0;flex-wrap:wrap;}
.schip{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px;}
.sdot{width:7px;height:7px;border-radius:50%;}
.pbar{width:100px;height:3px;background:var(--surface2);border-radius:2px;overflow:hidden;}
.pfill{height:100%;background:linear-gradient(90deg,var(--accent),var(--purple));border-radius:2px;transition:width .3s;}

/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:240px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sb-head{padding:10px 12px;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);}
.sb-list{flex:1;overflow-y:auto;padding:4px;}
.sb-list::-webkit-scrollbar{width:3px;}
.sb-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.pitem{display:flex;align-items:center;gap:7px;padding:7px 8px;border-radius:7px;cursor:pointer;border:1px solid transparent;transition:all .1s;}
.pitem:hover{background:var(--surface2);}
.pitem.active{background:var(--surface2);border-color:var(--accent);}
.pitem.seen .sdot2{opacity:1!important;}
.pnum{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);min-width:32px;}
.ptitle{font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sdot2{width:6px;height:6px;border-radius:50%;background:var(--green);opacity:0;flex-shrink:0;}
.ddot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

/* MAIN CARD AREA */
.cardarea{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

/* CARD CONTAINER — no 3D, just show/hide */
.cardwrap{flex:1;overflow:hidden;position:relative;margin:16px 16px 0 16px;}

.card{position:absolute;inset:0;background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow-y:auto;padding:24px 28px;display:none;flex-direction:column;gap:16px;}
.card.visible{display:flex;}
.card::-webkit-scrollbar{width:4px;}
.card::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* card front */
.card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
.card-id{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:4px;}
.card-title{font-size:20px;font-weight:700;line-height:1.3;}
.tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.tag{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid;}
.tag.easy{color:var(--green);border-color:var(--green);background:rgba(63,185,80,.1);}
.tag.medium{color:var(--yellow);border-color:var(--yellow);background:rgba(210,153,34,.1);}
.tag.hard{color:var(--red);border-color:var(--red);background:rgba(248,81,73,.1);}
.tag.topic{color:var(--purple);border-color:var(--purple);background:rgba(188,140,255,.1);}
.tag.seen-tag{color:var(--green);border-color:var(--green);background:rgba(63,185,80,.15);display:none;}
.tag.seen-tag.show{display:inline-block;}
.fam-stars{font-size:18px;flex-shrink:0;}
.star{color:var(--dim);}
.star.on{color:var(--yellow);}

.divider{height:1px;background:var(--border);margin:0 -4px;}
.desc-label{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}
.desc-text{font-size:15px;line-height:1.8;color:var(--text);}
.flip-hint{text-align:center;font-size:12px;color:var(--dim);padding-top:4px;}

/* card back sections */
.section{display:flex;flex-direction:column;gap:8px;}
.slabel{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:8px;}
.slabel::after{content:'';flex:1;height:1px;background:var(--border);}
.strat{font-size:14px;line-height:1.8;}
.strat ul{list-style:none;padding:0;}
.strat li{padding:3px 0 3px 18px;position:relative;}
.strat li::before{content:'▸';position:absolute;left:0;color:var(--accent);font-size:11px;top:5px;}

.codebox{background:#0d1117;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.codehdr{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:var(--surface2);border-bottom:1px solid var(--border);}
.codelang{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--purple);font-weight:600;}
.copybtn{background:none;border:1px solid var(--border);color:var(--muted);padding:3px 8px;border-radius:5px;font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s;}
.copybtn:hover{border-color:var(--accent);color:var(--accent);}
pre{padding:14px;overflow-x:auto;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.7;color:#e6edf3;white-space:pre;}
.kw{color:#ff7b72;} .tp{color:#ffa657;} .cm{color:#8b949e;} .nm{color:#79c0ff;} .st{color:#a5d6ff;}

.cxtable{width:100%;border-collapse:collapse;font-size:13px;border-radius:8px;overflow:hidden;}
.cxtable th{background:var(--surface2);padding:8px 14px;text-align:left;font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);}
.cxtable td{padding:10px 14px;border-bottom:1px solid var(--border);font-family:'JetBrains Mono',monospace;color:var(--green);font-weight:600;}
.cxtable tr:last-child td{border-bottom:none;}
.cxtable .tdlabel{color:var(--muted);font-family:'Inter',sans-serif;font-weight:400;}

/* CONTROLS */
.controls{padding:12px 16px;display:flex;gap:8px;align-items:center;flex-shrink:0;flex-wrap:wrap;border-top:1px solid var(--border);}
.navbtn{width:38px;height:38px;border-radius:9px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.navbtn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
.navbtn:disabled{opacity:.3;cursor:not-allowed;}
.counter{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);padding:8px 12px;background:var(--surface2);border-radius:20px;border:1px solid var(--border);}
.flipbtn{flex:1;padding:10px 16px;border-radius:9px;background:var(--accent);border:none;color:#000;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;min-width:120px;}
.seenbtn{padding:10px 14px;border-radius:9px;border:1px solid var(--green);background:rgba(63,185,80,.1);color:var(--green);font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s;}
.seenbtn.on{background:var(--green);color:#000;}

/* FAM ROW */
.famrow{padding:0 16px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0;}
.famlabel{font-size:12px;color:var(--muted);white-space:nowrap;}
.fambtn{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s;}
.fambtn[data-lv="1"].sel{background:rgba(248,81,73,.2);border-color:var(--red);color:var(--red);}
.fambtn[data-lv="2"].sel{background:rgba(210,153,34,.2);border-color:var(--yellow);color:var(--yellow);}
.fambtn[data-lv="3"].sel{background:rgba(88,166,255,.2);border-color:var(--accent);color:var(--accent);}
.fambtn[data-lv="4"].sel{background:rgba(63,185,80,.2);border-color:var(--green);color:var(--green);}
.fambtn[data-lv="5"].sel{background:rgba(188,140,255,.2);border-color:var(--purple);color:var(--purple);}

/* TODAY PANEL */
.today{margin:0 16px 16px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;flex-shrink:0;}
.today-hdr{font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
.today-chips{display:flex;flex-wrap:wrap;gap:6px;}
.tchip{padding:4px 9px;border-radius:20px;background:rgba(88,166,255,.1);border:1px solid rgba(88,166,255,.3);font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--accent);cursor:pointer;display:flex;align-items:center;gap:5px;}
.tchip:hover{background:rgba(88,166,255,.2);}
.tremove{color:var(--muted);font-size:15px;line-height:1;}
.today-empty{font-size:12px;color:var(--dim);font-style:italic;}

/* MOBILE */
@media(max-width:640px){
  html,body{overflow:auto;height:auto;}
  .layout{flex-direction:column;overflow:visible;}
  .sidebar{width:100%;height:auto;border-right:none;border-bottom:1px solid var(--border);}
  .sb-list{max-height:160px;display:flex;flex-wrap:wrap;gap:2px;padding:6px;}
  .pitem{width:calc(50% - 2px);}
  .cardarea{overflow:visible;}
  .cardwrap{height:auto;min-height:400px;position:relative;margin:12px 12px 0;}
  .card{position:relative;inset:auto;display:none;flex-direction:column;}
  .card.visible{display:flex;}
}
</style>
</head>
<body>

<header>
  <div class="logo">LC<span>.notes</span></div>
  <div class="hcontrols">
    <input type="text" id="searchBox" placeholder="搜尋題號/題名…" />
    <select id="topicSel">
      <option value="all">全部主題</option>
      <option value="String">String</option>

<div class="statsbar">

  <div class="schip"><div class="sdot" style="background:var(--green)"></div><span id="s2">今日 0</span></div>
  <div class="schip"><div class="sdot" style="background:var(--yellow)"></div><span id="s3">熟練 0</span></div>
  <div class="pbar" style="margin-left:auto"><div class="pfill" id="pf" style="width:0%"></div></div>
  <span style="font-size:12px;color:var(--muted)" id="pct">0%</span>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sb-head">題目列表</div>
    <div class="sb-list" id="sbList"></div>
  </div>

  <div class="cardarea">
    <div class="cardwrap">
      <!-- FRONT -->
      <div class="card visible" id="cardFront"></div>
      <!-- BACK -->
      <div class="card" id="cardBack"></div>
    </div>

    <div class="controls">
      <button class="navbtn" id="prevBtn" disabled>‹</button>
      <button class="navbtn" id="nextBtn">›</button>
      <span class="counter" id="counter">1 / 1</span>
      <button class="flipbtn" id="flipBtn">🔄 翻面看解法</button>
      <button class="seenbtn" id="seenBtn">○ 今日已看</button>
    </div>

    <div class="famrow">
      <span class="famlabel">熟悉度：</span>
      <button class="fambtn" data-lv="1">😵 不熟</button>
      <button class="fambtn" data-lv="2">🤔 模糊</button>
      <button class="fambtn" data-lv="3">👍 了解</button>
      <button class="fambtn" data-lv="4">💪 熟練</button>
      <button class="fambtn" data-lv="5">⚡ 秒殺</button>

      <div class="today-hdr">
        <span>📅 今日練習</span>
        <button class="btn" id="clearBtn" style="padding:4px 9px;font-size:11px;">清除</button>
      </div>
      <div class="today-chips" id="todayChips"></div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  PROBLEM DATA  (30 題全部寫好)
// ═══════════════════════════════════════════
const PROBLEMS = [
{
  id:3,title:"Longest Substring Without Repeating Characters",difficulty:"Medium",topics:["String","Sliding Window","Hash Table"],
  desc:"給一個字串 s，找出不含重複字符的最長子字串長度。",
  strat:`<ul><li>滑動窗口 + Queue：維護一個不含重複字符的窗口</li><li>對每個字符 c：若 Queue 中已含 c，從頭部 Dequeue 直到移除舊的 c</li><li>將 c 加入 Queue，更新 maxLen = max(maxLen, Queue.Count)</li></ul>`,
  code:`public int LengthOfLongestSubstring(string s) {
    var queue = new Queue<char>();
    int maxLen = 0;
    foreach (char c in s) {
        while (queue.Contains(c))
            queue.Dequeue();
        queue.Enqueue(c);
        maxLen = Math.Max(maxLen, queue.Count);
    }
    return maxLen;
}`,time:"O(N)",space:"O(min(N,M))"
},{
  id:6,title:"Zigzag Conversion",difficulty:"Medium",topics:["String"],
  desc:"將字串以 ZigZag 模式排列在 numRows 行中，然後按行讀取輸出。例如 'PAYPALISHIRING' 以 3 行排列後讀取得到 'PAHNAPLSIGIG YIR'。",
  strat:`<ul><li>建立 numRows 個 StringBuilder，每個代表一行</li><li>用 curRow 追蹤當前行，goingDown 控制方向</li><li>當 curRow 到達頂部或底部時，反轉方向</li><li>最後將所有行的 StringBuilder 拼接輸出</li></ul>`,
  code:`public string Convert(string s, int numRows) {
    if (numRows == 1 || s.Length <= numRows) return s;
    var rows = new StringBuilder[Math.Min(numRows, s.Length)];
    for (int i = 0; i < rows.Length; i++)
        rows[i] = new StringBuilder();
    int curRow = 0; bool goingDown = false;
    foreach (char c in s) {
        rows[curRow].Append(c);
        if (curRow == 0 || curRow == numRows - 1)
            goingDown = !goingDown;
        curRow += goingDown ? 1 : -1;
    }
    var result = new StringBuilder();
    foreach (var row in rows) result.Append(row);
    return result.ToString();
}`,time:"O(N)",space:"O(N)"
},{
  id:12,title:"Integer to Roman",difficulty:"Medium",topics:["String","Math"],
  desc:"將整數轉換為羅馬數字。羅馬數字由 I, V, X, L, C, D, M 組成，且有 IV, IX, XL 等減法規則。",
  strat:`<ul><li>建立值由大到小的對照表（包含 4, 9, 40, 90... 等特殊減法形式）</li><li>從最大值開始貪心匹配，每次盡可能多用當前符號</li><li>用 num / val 算次數，拼接字串，num %= val 繼續往下</li></ul>`,
  code:`public string IntToRoman(int num) {
    int[] vals =    { 1000,900,500,400,100,90,50,40,10,9,5,4,1 };
    string[] syms = { "M","CM","D","CD","C","XC","L","XL","X","IX","V","IV","I" };
    var sb = new StringBuilder();
    for (int i = 0; i < vals.Length; i++) {
        int cnt = num / vals[i];
        num %= vals[i];
        while (cnt-- > 0) sb.Append(syms[i]);
    }
    return sb.ToString();
}`,time:"O(1)",space:"O(1)"
},{
  id:14,title:"Longest Common Prefix",difficulty:"Easy",topics:["String"],
  desc:"找出字串陣列中所有字串的最長公共前綴，若不存在則返回空字串。",
  strat:`<ul><li>以第一個字串為基準，逐字符和其餘字串比較</li><li>任何一個字串在該位置不匹配或超出長度，就截斷並返回</li><li>也可先排序，只比較第一個和最後一個字串即可</li></ul>`,
  code:`public string LongestCommonPrefix(string[] strs) {
    if (strs.Length == 0) return "";
    string prefix = strs[0];
    for (int i = 1; i < strs.Length; i++) {
        while (!strs[i].StartsWith(prefix))
            prefix = prefix.Substring(0, prefix.Length - 1);
        if (prefix == "") return "";
    }
    return prefix;
}`,time:"O(S)",space:"O(1)"
},{
  id:20,title:"Valid Parentheses",difficulty:"Easy",topics:["String","Stack"],
  desc:"給一個只包含 '('、')'、'{'、'}'、'['、']' 的字串，判斷括號是否有效閉合（順序正確且完全配對）。",
  strat:`<ul><li>用 Stack 處理：遇到左括號 push 對應的右括號</li><li>遇到右括號則檢查 Stack 頂是否匹配，不匹配或 Stack 空則 false</li><li>最後 Stack 必須為空才表示全部有效閉合</li></ul>`,
  code:`public bool IsValid(string s) {
    var stack = new Stack<char>();
    foreach (char c in s) {
        if      (c == '(') stack.Push(')');
        else if (c == '[') stack.Push(']');
        else if (c == '{') stack.Push('}');
        else if (stack.Count == 0 || stack.Pop() != c)
            return false;
    }
    return stack.Count == 0;
}`,time:"O(N)",space:"O(N)"
},{
  id:21,title:"Merge Two Sorted Lists",difficulty:"Easy",topics:["Linked List"],
  desc:"將兩個已排序的鏈結串列合併為一個新的已排序鏈結串列，返回合併後的頭節點。",
  strat:`<ul><li>建立 dummy 節點作為起始，curr 指向 dummy</li><li>比較兩個串列的當前節點，將較小者接在 curr 後面</li><li>其中一個為空後，將另一個直接接上即可</li></ul>`,
  code:`public ListNode MergeTwoLists(ListNode l1, ListNode l2) {
    var dummy = new ListNode(0);
    ListNode curr = dummy;
    while (l1 != null && l2 != null) {
        if (l1.val <= l2.val) { curr.next = l1; l1 = l1.next; }
        else                  { curr.next = l2; l2 = l2.next; }
        curr = curr.next;
    }
    curr.next = l1 ?? l2;
    return dummy.next;
}`,time:"O(M+N)",space:"O(1)"
},{
  id:27,title:"Remove Element",difficulty:"Easy",topics:["Array","Two Pointers"],
  desc:"給一個陣列 nums 和值 val，原地移除所有等於 val 的元素，返回移除後陣列的長度。",
  strat:`<ul><li>雙指針：left 指向下一個放置位置，right 遍歷整個陣列</li><li>若 nums[right] != val，則將其複製到 nums[left]，left++</li><li>最後返回 left 即為新長度</li></ul>`,
  code:`public int RemoveElement(int[] nums, int val) {
    int left = 0;
    for (int right = 0; right < nums.Length; right++) {
        if (nums[right] != val)
            nums[left++] = nums[right];
    }
    return left;
}`,time:"O(N)",space:"O(1)"
},{
  id:28,title:"Find the Index of the First Occurrence in a String",difficulty:"Easy",topics:["String"],
  desc:"給兩個字串 haystack 和 needle，找出 needle 在 haystack 中第一次出現的 index，若不存在返回 -1。",
  strat:`<ul><li>直接用 haystack.IndexOf(needle) 即可（KMP 概念）</li><li>手動實現：外層遍歷 haystack，內層比較是否從該位置開始符合 needle</li><li>若 haystack 長度 - i < needle 長度，提前結束</li></ul>`,
  code:`public int StrStr(string haystack, string needle) {
    if (needle.Length == 0) return 0;
    for (int i = 0; i <= haystack.Length - needle.Length; i++) {
        int j = 0;
        while (j < needle.Length && haystack[i + j] == needle[j]) j++;
        if (j == needle.Length) return i;
    }
    return -1;
}`,time:"O(N×M)",space:"O(1)"
},{
  id:36,title:"Valid Sudoku",difficulty:"Medium",topics:["Array","Hash Table"],
  desc:"驗證一個 9×9 的數獨是否有效。每行、每列、每個 3×3 宮格中的數字 1-9 不可重複（空格以 '.' 表示）。",
  strat:`<ul><li>用三組 HashSet 分別追蹤每行、每列、每個 3×3 宮格中出現的數字</li><li>宮格索引 = (row/3)*3 + col/3</li><li>若任何數字在同一行/列/宮格重複出現，返回 false</li></ul>`,
  code:`public bool IsValidSudoku(char[][] board) {
    var rows = new HashSet<char>[9];
    var cols = new HashSet<char>[9];
    var boxs = new HashSet<char>[9];
    for (int i = 0; i < 9; i++) {
        rows[i] = new HashSet<char>();
        cols[i] = new HashSet<char>();
        boxs[i] = new HashSet<char>();
    }
    for (int r = 0; r < 9; r++) {
        for (int c = 0; c < 9; c++) {
            char ch = board[r][c];
            if (ch == '.') continue;
            int box = (r / 3) * 3 + c / 3;
            if (!rows[r].Add(ch) || !cols[c].Add(ch) || !boxs[box].Add(ch))
                return false;
        }
    }
    return true;
}`,time:"O(1)",space:"O(1)"
},{
  id:42,title:"Trapping Rain Water",difficulty:"Hard",topics:["Array","Two Pointers","Stack"],
  desc:"給一個整數陣列代表高度，計算它可以接住多少雨水（每個位置能接的水量取決於左右最大高度的最小值減去自身高度）。",
  strat:`<ul><li>雙指針：left=0, right=n-1，各維護 leftMax, rightMax</li><li>若 height[left] < height[right]，處理左側：leftMax - height[left] 加入結果，left++</li><li>否則處理右側：rightMax - height[right] 加入結果，right--</li><li>每次都從「較矮一側」處理，因為決定水位的是較低的那側</li></ul>`,
  code:`public int Trap(int[] height) {
    int left = 0, right = height.Length - 1;
    int leftMax = 0, rightMax = 0, water = 0;
    while (left < right) {
        if (height[left] < height[right]) {
            leftMax = Math.Max(leftMax, height[left]);
            water += leftMax - height[left];
            left++;
        } else {
            rightMax = Math.Max(rightMax, height[right]);
            water += rightMax - height[right];
            right--;
        }
    }
    return water;
}`,time:"O(N)",space:"O(1)"
},{
  id:48,title:"Rotate Image",difficulty:"Medium",topics:["Array"],
  desc:"原地旋轉一個 n×n 的二維矩陣 90 度（順時針）。不得使用額外矩陣。",
  strat:`<ul><li>由外到內逐層旋轉，四個角同時交換</li><li>外層指針 left/right 縮進，每層做 right-left 次交換</li><li>另解：先轉置（Transpose），再對每行左右翻轉，等同順時針 90 度</li></ul>`,
  code:`public void Rotate(int[][] matrix) {
    int left = 0, right = matrix.Length - 1;
    while (left < right) {
        int top = left, bottom = right;
        for (int i = 0; i < right - left; i++) {
            int tmp = matrix[top][left + i];
            matrix[top][left + i]     = matrix[bottom - i][left];
            matrix[bottom - i][left]  = matrix[bottom][right - i];
            matrix[bottom][right - i] = matrix[top + i][right];
            matrix[top + i][right]    = tmp;
        }
        left++; right--;
    }
}`,time:"O(N²)",space:"O(1)"
},{
  id:49,title:"Group Anagrams",difficulty:"Medium",topics:["String","Hash Table"],
  desc:"給一個字串陣列，將所有互為 Anagram（字母相同但順序不同）的字串分組返回。",
  strat:`<ul><li>對每個字串排序後作為 key，相同 key 的字串歸為一組</li><li>用 Dictionary&lt;string, List&lt;string&gt;&gt; 存儲分組</li><li>最後返回所有 values</li></ul>`,
  code:`public IList<IList<string>> GroupAnagrams(string[] strs) {
    var map = new Dictionary<string, List<string>>();
    foreach (string s in strs) {
        char[] arr = s.ToCharArray();
        Array.Sort(arr);
        string key = new string(arr);
        if (!map.ContainsKey(key))
            map[key] = new List<string>();
        map[key].Add(s);
    }
    return new List<IList<string>>(map.Values);
}`,time:"O(N×K log K)",space:"O(N×K)"
},{
  id:53,title:"Maximum Subarray",difficulty:"Medium",topics:["Array","DP"],
  desc:"給一個整數陣列，找出連續子陣列中和最大的值（Kadane's Algorithm 經典題）。",
  strat:`<ul><li>Kadane's Algorithm：維護 curSum（當前子陣列和）和 maxSum</li><li>若 curSum < 0，捨棄前面的子陣列，從當前元素重新開始</li><li>每步更新 maxSum = max(maxSum, curSum)</li></ul>`,
  code:`public int MaxSubArray(int[] nums) {
    int maxSum = nums[0], curSum = nums[0];
    for (int i = 1; i < nums.Length; i++) {
        curSum = Math.Max(nums[i], curSum + nums[i]);
        maxSum = Math.Max(maxSum, curSum);
    }
    return maxSum;
}`,time:"O(N)",space:"O(1)"
},{
  id:55,title:"Jump Game",difficulty:"Medium",topics:["Array"],
  desc:"給一個非負整數陣列，每個元素代表從該位置最多能跳的步數，判斷是否能從 index 0 跳到最後一個 index。",
  strat:`<ul><li>維護 maxReachable（當前能到達的最遠位置）</li><li>遍歷陣列，若當前 index > maxReachable 則無法到達，返回 false</li><li>否則更新 maxReachable = max(maxReachable, i + nums[i])</li></ul>`,
  code:`public bool CanJump(int[] nums) {
    int maxReachable = 0;
    for (int i = 0; i < nums.Length; i++) {
        if (i > maxReachable) return false;
        maxReachable = Math.Max(maxReachable, i + nums[i]);
    }
    return true;
}`,time:"O(N)",space:"O(1)"
},{
  id:56,title:"Merge Intervals",difficulty:"Medium",topics:["Interval","Array"],
  desc:"給一個區間陣列，合併所有重疊的區間，返回不重疊的區間陣列。",
  strat:`<ul><li>先按區間起始點排序</li><li>維護當前合併區間，若下一個起始 ≤ 當前終止，則合併（取 max 終止）</li><li>否則將當前區間加入結果，更新當前區間</li></ul>`,
  code:`public int[][] Merge(int[][] intervals) {
    Array.Sort(intervals, (a, b) => a[0].CompareTo(b[0]));
    var result = new List<int[]>();
    result.Add(intervals[0]);
    for (int i = 1; i < intervals.Length; i++) {
        int[] prev = result[result.Count - 1];
        int[] curr = intervals[i];
        if (curr[0] <= prev[1])
            prev[1] = Math.Max(prev[1], curr[1]);
        else
            result.Add(curr);
    }
    return result.ToArray();
}`,time:"O(N log N)",space:"O(N)"
},{
  id:57,title:"Insert Interval",difficulty:"Medium",topics:["Interval","Array"],
  desc:"給一組已排序且不重疊的區間列表，插入一個新區間，並合併所有重疊的區間。",
  strat:`<ul><li>遍歷現有區間，分三種情況處理：</li><li>① 當前區間完全在 newInterval 左側 → 直接加入結果</li><li>② 重疊 → 合併：更新 newInterval 的左右邊界（min/max）</li><li>③ 當前區間完全在右側 → 若 newInterval 尚未插入則先插入，再加入當前</li></ul>`,
  code:`public int[][] Insert(int[][] intervals, int[] newInterval) {
    var result = new List<int[]>();
    bool inserted = false;
    foreach (var cur in intervals) {
        if (cur[1] < newInterval[0]) {
            result.Add(cur);
        } else if (cur[0] > newInterval[1]) {
            if (!inserted) { result.Add(newInterval); inserted = true; }
            result.Add(cur);
        } else {
            newInterval[0] = Math.Min(newInterval[0], cur[0]);
            newInterval[1] = Math.Max(newInterval[1], cur[1]);
        }
    }
    if (!inserted) result.Add(newInterval);
    return result.ToArray();
}`,time:"O(N)",space:"O(N)"
},{
  id:58,title:"Length of Last Word",difficulty:"Easy",topics:["String"],
  desc:"給一個字串 s，找出最後一個單詞的長度。單詞由空格分隔，最後一個單詞可能前面有多個空格。",
  strat:`<ul><li>從尾部往前掃，先跳過空格（去除尾部空白）</li><li>再計算非空格字符數，直到遇到空格或到頭</li><li>也可用 Split + RemoveEmptyEntries 取最後一個元素長度</li></ul>`,
  code:`public int LengthOfLastWord(string s) {
    int i = s.Length - 1, len = 0;
    while (i >= 0 && s[i] == ' ') i--;   // 跳過尾部空格
    while (i >= 0 && s[i] != ' ') { len++; i--; }
    return len;
}`,time:"O(N)",space:"O(1)"
},{
  id:66,title:"Plus One",difficulty:"Easy",topics:["Array","Math"],
  desc:"給一個非負整數陣列表示的數字（最高位在 index 0），在這個數字上加一。",
  strat:`<ul><li>從陣列尾部往前遍歷</li><li>若當前位 < 9，直接 +1 返回</li><li>若當前位 = 9，設為 0 繼續進位</li><li>若整個陣列都是 9，建立長度+1 的新陣列，首位設為 1</li></ul>`,
  code:`public int[] PlusOne(int[] digits) {
    for (int i = digits.Length - 1; i >= 0; i--) {
        if (digits[i] < 9) { digits[i]++; return digits; }
        digits[i] = 0;
    }
    int[] result = new int[digits.Length + 1];
    result[0] = 1;
    return result;
}`,time:"O(N)",space:"O(1)"
},{
  id:73,title:"Set Matrix Zeroes",difficulty:"Medium",topics:["Array"],
  desc:"給一個 m×n 矩陣，若某元素為 0，則將其所在的整行和整列都設為 0，要求 in-place 操作。",
  strat:`<ul><li>用第一行和第一列作為標記陣列（省 O(m+n) 空間）</li><li>先記錄第一行、第一列自身是否含零（fstRow, fstCol）</li><li>掃描內部，matrix[i][j]==0 則把 matrix[i][0] 和 matrix[0][j] 標為 0</li><li>根據標記將內部元素置零，最後再處理第一行/列</li></ul>`,
  code:`public void SetZeroes(int[][] matrix) {
    int m = matrix.Length, n = matrix[0].Length;
    bool fstRow = false, fstCol = false;
    for (int j = 0; j < n; j++) if (matrix[0][j] == 0) fstRow = true;
    for (int i = 0; i < m; i++) if (matrix[i][0] == 0) fstCol = true;
    for (int i = 1; i < m; i++)
        for (int j = 1; j < n; j++)
            if (matrix[i][j] == 0) { matrix[i][0] = 0; matrix[0][j] = 0; }
    for (int i = 1; i < m; i++)
        for (int j = 1; j < n; j++)
            if (matrix[i][0] == 0 || matrix[0][j] == 0) matrix[i][j] = 0;
    if (fstRow) for (int j = 0; j < n; j++) matrix[0][j] = 0;
    if (fstCol) for (int i = 0; i < m; i++) matrix[i][0] = 0;
}`,time:"O(M×N)",space:"O(1)"
},{
  id:88,title:"Merge Sorted Array",difficulty:"Easy",topics:["Array","Two Pointers"],
  desc:"給兩個已排序的整數陣列 nums1 和 nums2，將 nums2 合併到 nums1 中使其排序。nums1 有足夠空間（末尾有 n 個 0）。",
  strat:`<ul><li>從後往前合併，避免覆蓋 nums1 前面的有效元素</li><li>三個指針：i = m-1, j = n-1, k = m+n-1</li><li>比較 nums1[i] 和 nums2[j]，將較大者放到 nums1[k]，指針往前移</li><li>若 nums2 還有剩餘，直接複製到 nums1 前面</li></ul>`,
  code:`public void Merge(int[] nums1, int m, int[] nums2, int n) {
    int i = m - 1, j = n - 1, k = m + n - 1;
    while (i >= 0 && j >= 0) {
        if (nums1[i] > nums2[j])
            nums1[k--] = nums1[i--];
        else
            nums1[k--] = nums2[j--];
    }
    while (j >= 0) nums1[k--] = nums2[j--];
}`,time:"O(M+N)",space:"O(1)"
},{
  id:98,title:"Validate Binary Search Tree",difficulty:"Medium",topics:["Tree"],
  desc:"驗證一棵二叉搜尋樹（BST）是否合法。要求：左子樹所有節點 < 根，右子樹所有節點 > 根，且遞迴成立。",
  strat:`<ul><li>遞歸傳遞合法值域範圍 (min, max)</li><li>每個節點的值必須嚴格在 (min, max) 之間</li><li>往左遞歸時更新 max = node.val；往右遞歸時更新 min = node.val</li></ul>`,
  code:`public bool IsValidBST(TreeNode root) {
    return Validate(root, long.MinValue, long.MaxValue);
}
bool Validate(TreeNode node, long min, long max) {
    if (node == null) return true;
    if (node.val <= min || node.val >= max) return false;
    return Validate(node.left,  min,      node.val) &&
           Validate(node.right, node.val, max);
}`,time:"O(N)",space:"O(N)"
},{
  id:100,title:"Same Tree",difficulty:"Easy",topics:["Tree"],
  desc:"給兩棵二叉樹，判斷它們是否結構相同且每個對應節點值相同。",
  strat:`<ul><li>遞歸：同時為 null 返回 true；任一為 null 返回 false</li><li>值不同返回 false</li><li>遞歸判斷左子樹和右子樹都相同</li></ul>`,
  code:`public bool IsSameTree(TreeNode p, TreeNode q) {
    if (p == null && q == null) return true;
    if (p == null || q == null) return false;
    if (p.val != q.val) return false;
    return IsSameTree(p.left, q.left) &&
           IsSameTree(p.right, q.right);
}`,time:"O(N)",space:"O(N)"
},{
  id:101,title:"Symmetric Tree",difficulty:"Easy",topics:["Tree"],
  desc:"給一棵二叉樹，判斷它是否是鏡像對稱的（左右子樹互為鏡像）。",
  strat:`<ul><li>遞歸：比較左子樹和右子樹是否互為鏡像</li><li>isMirror(left, right)：兩者都 null → true；任一 null 或值不同 → false</li><li>遞歸判斷 left.left == right.right 且 left.right == right.left</li></ul>`,
  code:`public bool IsSymmetric(TreeNode root) {
    return IsMirror(root?.left, root?.right);
}
bool IsMirror(TreeNode l, TreeNode r) {
    if (l == null && r == null) return true;
    if (l == null || r == null || l.val != r.val) return false;
    return IsMirror(l.left, r.right) && IsMirror(l.right, r.left);
}`,time:"O(N)",space:"O(N)"
},{
  id:102,title:"Binary Tree Level Order Traversal",difficulty:"Medium",topics:["Tree"],
  desc:"給一棵二叉樹，返回其節點值的層序遍歷結果（逐層從左到右）。",
  strat:`<ul><li>BFS 用 Queue：每次處理一整層（先記錄當前層的 size）</li><li>將每層節點值收集到 List，加入結果</li><li>遍歷每層時，將左右子節點加入 Queue</li></ul>`,
  code:`public IList<IList<int>> LevelOrder(TreeNode root) {
    var result = new List<IList<int>>();
    if (root == null) return result;
    var queue = new Queue<TreeNode>();
    queue.Enqueue(root);
    while (queue.Count > 0) {
        int size = queue.Count;
        var level = new List<int>();
        for (int i = 0; i < size; i++) {
            var node = queue.Dequeue();
            level.Add(node.val);
            if (node.left  != null) queue.Enqueue(node.left);
            if (node.right != null) queue.Enqueue(node.right);
        }
        result.Add(level);
    }
    return result;
}`,time:"O(N)",space:"O(N)"
},{
  id:112,title:"Path Sum",difficulty:"Easy",topics:["Tree"],
  desc:"給一個二叉樹和目標值 targetSum，判斷是否存在從根到葉子節點的路徑使得路徑上所有值的和等於 targetSum。",
  strat:`<ul><li>遞歸 DFS：每次遞歸將 targetSum 減去當前節點值</li><li>到達葉子節點（left == null && right == null）時，檢查剩餘是否為 0</li><li>左右子樹任一返回 true 即可</li></ul>`,
  code:`public bool HasPathSum(TreeNode root, int targetSum) {
    if (root == null) return false;
    targetSum -= root.val;
    if (root.left == null && root.right == null)
        return targetSum == 0;
    return HasPathSum(root.left,  targetSum) ||
           HasPathSum(root.right, targetSum);
}`,time:"O(N)",space:"O(N)"
},{
  id:130,title:"Surrounded Regions",difficulty:"Medium",topics:["Graph"],
  desc:"給一個包含 'X' 和 'O' 的二維矩陣，將所有被 'X' 完全圍住的 'O' 翻轉為 'X'。與邊界相連的 'O' 不翻轉。",
  strat:`<ul><li>逆向思維：先從四條邊的 'O' 出發，BFS 標記所有與邊界相連的 'O'（標為 '#'）</li><li>'O' → 'X'（被圍住），'#' → 'O'（恢復邊界連通的），'X' 不變</li><li>此方法無需判斷每個 'O' 是否連通邊界，統一處理</li></ul>`,
  code:`public void Solve(char[][] board) {
    int m = board.Length, n = board[0].Length;
    var queue = new Queue<(int r, int c)>();
    for (int r = 0; r < m; r++) {
        if (board[r][0]   == 'O') queue.Enqueue((r, 0));
        if (board[r][n-1] == 'O') queue.Enqueue((r, n-1));
    }
    for (int c = 0; c < n; c++) {
        if (board[0][c]   == 'O') queue.Enqueue((0, c));
        if (board[m-1][c] == 'O') queue.Enqueue((m-1, c));
    }
    int[] dr = {1,-1,0,0}, dc = {0,0,1,-1};
    while (queue.Count > 0) {
        var (r, c) = queue.Dequeue();
        if (r < 0||r >= m||c < 0||c >= n||board[r][c] != 'O') continue;
        board[r][c] = '#';
        for (int d = 0; d < 4; d++) queue.Enqueue((r+dr[d], c+dc[d]));
    }
    for (int r = 0; r < m; r++)
        for (int c = 0; c < n; c++)
            board[r][c] = board[r][c] == '#' ? 'O'
                        : board[r][c] == 'O' ? 'X' : board[r][c];
}`,time:"O(M×N)",space:"O(M×N)"
},{
  id:134,title:"Gas Station",difficulty:"Medium",topics:["Array"],
  desc:"N 個加油站排成一圈，gas[i] 是第 i 站的油量，cost[i] 是從第 i 站到下一站的耗油量。找出能繞行一圈的起點，若無解返回 -1。",
  strat:`<ul><li>關鍵定理：若 totalSum >= 0，則一定有解（且解唯一）</li><li>若從某站出發 curSum < 0，代表這個起點不可行，將 start 設為 i+1</li><li>重置 curSum 繼續累加，最終若 totalSum >= 0 則返回 start</li></ul>`,
  code:`public int CanCompleteCircuit(int[] gas, int[] cost) {
    int total = 0, cur = 0, start = 0;
    for (int i = 0; i < gas.Length; i++) {
        int net = gas[i] - cost[i];
        total += net;
        cur   += net;
        if (cur < 0) { start = i + 1; cur = 0; }
    }
    return total < 0 ? -1 : start;
}`,time:"O(N)",space:"O(1)"
},{
  id:155,title:"Min Stack",difficulty:"Medium",topics:["Stack","Design"],
  desc:"設計一個支持 push、pop、top 和 getMin 操作的 Stack，其中 getMin 必須在 O(1) 時間內返回 Stack 中的最小值。",
  strat:`<ul><li>使用兩個 Stack：主 stack 和 minStack 追蹤最小值</li><li>Push 時：若 minStack 為空或新值 ≤ 當前最小值，也 push 到 minStack</li><li>Pop 時：若 pop 的值等於 minStack 頂部，同時 pop minStack</li></ul>`,
  code:`public class MinStack {
    Stack<int> stack    = new Stack<int>();
    Stack<int> minStack = new Stack<int>();

    public void Push(int val) {
        stack.Push(val);
        if (minStack.Count == 0 || val <= minStack.Peek())
            minStack.Push(val);
    }
    public void Pop() {
        int val = stack.Pop();
        if (val == minStack.Peek()) minStack.Pop();
    }
    public int Top()    => stack.Peek();
    public int GetMin() => minStack.Peek();
}`,time:"O(1) 所有操作",space:"O(N)"
},{
  id:169,title:"Majority Element",difficulty:"Easy",topics:["Array"],
  desc:"找出陣列中出現次數超過 n/2 的多數元素。題目保證多數元素一定存在。",
  strat:`<ul><li>Boyer-Moore 投票算法：維護 candidate 和 count</li><li>count == 0 時換 candidate 為當前元素</li><li>相同則 count++，不同則 count--</li><li>遍歷結束後 candidate 即為多數元素</li></ul>`,
  code:`public int MajorityElement(int[] nums) {
    int count = 0, candidate = 0;
    foreach (int num in nums) {
        if (count == 0) candidate = num;
        count += (num == candidate) ? 1 : -1;
    }
    return candidate;
}`,time:"O(N)",space:"O(1)"
},{
  id:198,title:"House Robber",difficulty:"Medium",topics:["DP"],
  desc:"一排房子，每間有若干金額。不能搶相鄰兩間，求可以搶到的最大金額。",
  strat:`<ul><li>DP：dp[i] = 搶到第 i 間時的最大金額</li><li>dp[i] = max(dp[i-2] + nums[i], dp[i-1])（搶或不搶第 i 間）</li><li>空間優化：只需保留前兩個 dp 值（prev2, prev1）</li></ul>`,
  code:`public int Rob(int[] nums) {
    int prev2 = 0, prev1 = 0;
    foreach (int num in nums) {
        int cur = Math.Max(prev1, prev2 + num);
        prev2 = prev1;
        prev1 = cur;
    }
    return prev1;
}`,time:"O(N)",space:"O(1)"
},{
  id:200,title:"Number of Islands",difficulty:"Medium",topics:["Graph"],
  desc:"給一個由 '1'（陸地）和 '0'（水）組成的二維網格，計算島嶼的數量。島嶼由水平/垂直相鄰的陸地構成。",
  strat:`<ul><li>遍歷網格，遇到 '1' 就島嶼數 +1</li><li>對該格子進行 BFS，將所有相連的 '1' 標記為 '0'（已訪問）</li><li>BFS 使用 Queue，每次將上下左右的相鄰 '1' 加入佇列</li></ul>`,
  code:`public int NumIslands(char[][] grid) {
    int m = grid.Length, n = grid[0].Length, count = 0;
    int[] dr = {1,-1,0,0}, dc = {0,0,1,-1};
    for (int r = 0; r < m; r++) {
        for (int c = 0; c < n; c++) {
            if (grid[r][c] != '1') continue;
            count++;
            var q = new Queue<(int,int)>();
            q.Enqueue((r, c)); grid[r][c] = '0';
            while (q.Count > 0) {
                var (cr, cc) = q.Dequeue();
                for (int d = 0; d < 4; d++) {
                    int nr = cr+dr[d], nc = cc+dc[d];
                    if (nr>=0&&nr<m&&nc>=0&&nc<n&&grid[nr][nc]=='1') {
                        grid[nr][nc] = '0'; q.Enqueue((nr, nc));
                    }
                }
            }
        }
    }
    return count;
}`,time:"O(M×N)",space:"O(min(M,N))"
},{
  id:208,title:"Implement Trie (Prefix Tree)",difficulty:"Medium",topics:["Trie","Design"],
  desc:"實現一個 Trie（前綴樹）資料結構，支持 insert、search、startsWith 三種操作。",
  strat:`<ul><li>每個 TrieNode 含 children[26]（對應 a-z）和 isEnd 標記</li><li>Insert：逐字符建立節點，最後標記 isEnd=true</li><li>Search：逐字符走到底，檢查 isEnd</li><li>StartsWith：逐字符走，路徑存在即可，不需檢查 isEnd</li></ul>`,
  code:`class TrieNode {
    public TrieNode[] ch = new TrieNode[26];
    public bool isEnd;
}
public class Trie {
    TrieNode root = new TrieNode();
    public void Insert(string word) {
        var cur = root;
        foreach (char c in word) {
            int i = c - 'a';
            if (cur.ch[i] == null) cur.ch[i] = new TrieNode();
            cur = cur.ch[i];
        }
        cur.isEnd = true;
    }
    public bool Search(string word) {
        var cur = root;
        foreach (char c in word) {
            int i = c - 'a';
            if (cur.ch[i] == null) return false;
            cur = cur.ch[i];
        }
        return cur.isEnd;
    }
    public bool StartsWith(string prefix) {
        var cur = root;
        foreach (char c in prefix) {
            int i = c - 'a';
            if (cur.ch[i] == null) return false;
            cur = cur.ch[i];
        }
        return true;
    }
}`,time:"O(M) 每次操作",space:"O(N×26)"
},{
  id:226,title:"Invert Binary Tree",difficulty:"Easy",topics:["Tree"],
  desc:"翻轉一棵二叉樹（左右子樹互換），返回翻轉後的根節點。",
  strat:`<ul><li>遞歸：先遞歸翻轉左子樹，再遞歸翻轉右子樹</li><li>然後交換當前節點的 left 和 right 指針</li><li>也可用 BFS 迭代：從佇列取出節點，交換左右，再將子節點入列</li></ul>`,
  code:`public TreeNode InvertTree(TreeNode root) {
    if (root == null) return null;
    TreeNode tmp = root.left;
    root.left  = InvertTree(root.right);
    root.right = InvertTree(tmp);
    return root;
}`,time:"O(N)",space:"O(N)"
},{
  id:242,title:"Valid Anagram",difficulty:"Easy",topics:["String","Hash Table"],
  desc:"給兩個字串 s 和 t，判斷 t 是否是 s 的 Anagram（字母相同，排列不同）。",
  strat:`<ul><li>用一個長度 26 的 int[] 記錄字符頻次</li><li>遍歷 s 時 freq[c - 'a']++，遍歷 t 時 freq[c - 'a']--</li><li>最後若所有位置都為 0 則返回 true</li></ul>`,
  code:`public bool IsAnagram(string s, string t) {
    if (s.Length != t.Length) return false;
    int[] freq = new int[26];
    for (int i = 0; i < s.Length; i++) {
        freq[s[i] - 'a']++;
        freq[t[i] - 'a']--;
    }
    return freq.All(x => x == 0);
}`,time:"O(N)",space:"O(1)"
},{
  id:290,title:"Word Pattern",difficulty:"Easy",topics:["String","Hash Table"],
  desc:"給一個 pattern 字串和一個 s 字串，判斷 s 是否遵循 pattern 的相同模式（一一對應雙向映射）。",
  strat:`<ul><li>將 s 按空格切分，若長度不同直接 false</li><li>用 Dictionary 建立 pattern 字元 → 單詞的映射</li><li>同時用 HashSet 追蹤已被用過的單詞（防止多對一）</li></ul>`,
  code:`public bool WordPattern(string pattern, string s) {
    string[] words = s.Split(' ');
    if (words.Length != pattern.Length) return false;
    var map  = new Dictionary<char, string>();
    var used = new HashSet<string>();
    for (int i = 0; i < pattern.Length; i++) {
        char p = pattern[i]; string w = words[i];
        if (map.ContainsKey(p)) {
            if (map[p] != w) return false;
        } else {
            if (used.Contains(w)) return false;
            map[p] = w; used.Add(w);
        }
    }
    return true;
}`,time:"O(N)",space:"O(N)"
},{
  id:300,title:"Longest Increasing Subsequence",difficulty:"Medium",topics:["DP","Binary Search"],
  desc:"給一個整數陣列，找出最長嚴格遞增子序列的長度（子序列不要求連續）。",
  strat:`<ul><li>DP O(N²)：dp[i] 為以 nums[i] 結尾的最長遞增子序列長度</li><li>對每個 i 遍歷 j < i，若 nums[j] < nums[i] 則 dp[i] = max(dp[i], dp[j]+1)</li><li>進階 O(N log N)：維護 tails 陣列，用二分搜尋找插入位置</li></ul>`,
  code:`// O(N log N) 解法
public int LengthOfLIS(int[] nums) {
    var tails = new List<int>();
    foreach (int num in nums) {
        int lo = 0, hi = tails.Count;
        while (lo < hi) {
            int mid = (lo + hi) / 2;
            if (tails[mid] < num) lo = mid + 1;
            else hi = mid;
        }
        if (lo == tails.Count) tails.Add(num);
        else tails[lo] = num;
    }
    return tails.Count;
}`,time:"O(N log N)",space:"O(N)"
},{
  id:17,title:"Letter Combinations of a Phone Number",difficulty:"Medium",topics:["Backtracking"],
  desc:"給一個由數字 2-9 組成的字串，返回所有可能的字母組合（對應電話九宮格按鍵）。",
  strat:`<ul><li>回溯法：建立數字→字母的對應表</li><li>遞歸依序對每個數字的每個字母做選擇，到達字串長度時加入結果</li><li>若 digits 為空直接返回空列表</li></ul>`,
  code:`public IList<string> LetterCombinations(string digits) {
    var res = new List<string>();
    if (digits.Length == 0) return res;
    string[] map = {"","","abc","def","ghi","jkl","mno","pqrs","tuv","wxyz"};
    void Backtrack(int idx, StringBuilder cur) {
        if (idx == digits.Length) { res.Add(cur.ToString()); return; }
        foreach (char c in map[digits[idx] - '0']) {
            cur.Append(c);
            Backtrack(idx + 1, cur);
            cur.Length--;
        }
    }
    Backtrack(0, new StringBuilder());
    return res;
}`,time:"O(4^N)",space:"O(N)"
},{
  id:19,title:"Remove Nth Node From End of List",difficulty:"Medium",topics:["Linked List","Two Pointers"],
  desc:"刪除鏈結串列中倒數第 n 個節點，返回頭節點。要求一次遍歷完成。",
  strat:`<ul><li>雙指針：fast 先走 n+1 步，然後 fast 和 slow 同時走</li><li>當 fast 到達末端時，slow 指向倒數第 n+1 個節點</li><li>用 dummy 節點簡化邊界情況（如刪除頭節點）</li></ul>`,
  code:`public ListNode RemoveNthFromEnd(ListNode head, int n) {
    var dummy = new ListNode(0); dummy.next = head;
    ListNode fast = dummy, slow = dummy;
    for (int i = 0; i < n + 1; i++) fast = fast.next;
    while (fast != null) { fast = fast.next; slow = slow.next; }
    slow.next = slow.next.next;
    return dummy.next;
}`,time:"O(N)",space:"O(1)"
},{
  id:23,title:"Merge k Sorted Lists",difficulty:"Hard",topics:["Linked List","Heap"],
  desc:"合併 k 個已排序的鏈結串列，返回一個合併後的排序鏈結串列。",
  strat:`<ul><li>MinHeap（PriorityQueue）：將每個串列的頭節點加入堆</li><li>每次取出最小節點接到結果，再將該節點的 next 加入堆</li><li>也可分治法：兩兩合併，共 log k 輪</li></ul>`,
  code:`public ListNode MergeKLists(ListNode[] lists) {
    var pq = new PriorityQueue<ListNode, int>();
    foreach (var node in lists)
        if (node != null) pq.Enqueue(node, node.val);
    var dummy = new ListNode(0);
    ListNode cur = dummy;
    while (pq.Count > 0) {
        var node = pq.Dequeue();
        cur.next = node; cur = cur.next;
        if (node.next != null) pq.Enqueue(node.next, node.next.val);
    }
    return dummy.next;
}`,time:"O(N log k)",space:"O(k)"
},{
  id:33,title:"Search in Rotated Sorted Array",difficulty:"Medium",topics:["Binary Search"],
  desc:"在一個旋轉過的有序陣列中找目標值，要求 O(log N) 時間複雜度。",
  strat:`<ul><li>二分搜尋：先判斷左半部分還是右半部分是有序的</li><li>若 nums[left] <= nums[mid]，左半有序；否則右半有序</li><li>判斷 target 是否在有序半側，決定往哪邊收縮</li></ul>`,
  code:`public int Search(int[] nums, int target) {
    int left = 0, right = nums.Length - 1;
    while (left <= right) {
        int mid = (left + right) / 2;
        if (nums[mid] == target) return mid;
        if (nums[left] <= nums[mid]) {       // 左半有序
            if (nums[left] <= target && target < nums[mid])
                right = mid - 1;
            else left = mid + 1;
        } else {                             // 右半有序
            if (nums[mid] < target && target <= nums[right])
                left = mid + 1;
            else right = mid - 1;
        }
    }
    return -1;
}`,time:"O(log N)",space:"O(1)"
},{
  id:39,title:"Combination Sum",difficulty:"Medium",topics:["Backtracking"],
  desc:"給一個不重複的整數陣列 candidates 和目標值 target，找出所有數字和等於 target 的組合（可重複使用同一個數字）。",
  strat:`<ul><li>回溯法：從 start 開始枚舉，每個元素可重複使用</li><li>若 remain == 0，加入結果；若 remain < 0，剪枝返回</li><li>先排序可提早剪枝（當前元素已 > remain 就停）</li></ul>`,
  code:`public IList<IList<int>> CombinationSum(int[] candidates, int target) {
    var res = new List<IList<int>>();
    Array.Sort(candidates);
    void Backtrack(int start, int remain, List<int> cur) {
        if (remain == 0) { res.Add(new List<int>(cur)); return; }
        for (int i = start; i < candidates.Length; i++) {
            if (candidates[i] > remain) break;
            cur.Add(candidates[i]);
            Backtrack(i, remain - candidates[i], cur);
            cur.RemoveAt(cur.Count - 1);
        }
    }
    Backtrack(0, target, new List<int>());
    return res;
}`,time:"O(N^(T/M))",space:"O(T/M)"
},{
  id:50,title:"Pow(x, n)",difficulty:"Medium",topics:["Math","Binary Search"],
  desc:"實現 pow(x, n)，即計算 x 的 n 次方。n 可為負整數。",
  strat:`<ul><li>快速冪（Binary Exponentiation）：n 為偶數時 x^n = (x²)^(n/2)</li><li>n 為奇數時 x^n = x * x^(n-1)</li><li>n 為負數時轉換為 1/x 的 -n 次方；注意 n = INT_MIN 要用 long</li></ul>`,
  code:`public double MyPow(double x, int n) {
    long N = n;
    if (N < 0) { x = 1 / x; N = -N; }
    double result = 1;
    while (N > 0) {
        if ((N & 1) == 1) result *= x;
        x *= x;
        N >>= 1;
    }
    return result;
}`,time:"O(log N)",space:"O(1)"
},{
  id:54,title:"Spiral Matrix",difficulty:"Medium",topics:["Array"],
  desc:"給一個 m×n 矩陣，以螺旋順序（右→下→左→上）返回所有元素。",
  strat:`<ul><li>維護四個邊界：top, bottom, left, right</li><li>依序遍歷：向右走完 top 行，top++；向下走完 right 列，right--</li><li>向左走完 bottom 行，bottom--；向上走完 left 列，left++</li><li>每次縮進邊界前先檢查邊界是否有效</li></ul>`,
  code:`public IList<int> SpiralOrder(int[][] matrix) {
    var res = new List<int>();
    int top = 0, bottom = matrix.Length - 1;
    int left = 0, right = matrix[0].Length - 1;
    while (top <= bottom && left <= right) {
        for (int c = left;  c <= right;  c++) res.Add(matrix[top][c]);    top++;
        for (int r = top;   r <= bottom; r++) res.Add(matrix[r][right]);  right--;
        if (top <= bottom)
            for (int c = right; c >= left;  c--) res.Add(matrix[bottom][c]); bottom--;
        if (left <= right)
            for (int r = bottom;r >= top;   r--) res.Add(matrix[r][left]);   left++;
    }
    return res;
}`,time:"O(M×N)",space:"O(1)"
},{
  id:67,title:"Add Binary",difficulty:"Easy",topics:["Math","Bit"],
  desc:"給兩個二進位字串 a 和 b，返回它們的和（也是二進位字串）。",
  strat:`<ul><li>從兩個字串末尾往前加，維護進位 carry</li><li>每次 sum = (a 當前位) + (b 當前位) + carry</li><li>結果位 = sum % 2，carry = sum / 2</li><li>最後若 carry == 1 在頭部補 '1'，然後反轉結果</li></ul>`,
  code:`public string AddBinary(string a, string b) {
    var sb = new StringBuilder();
    int i = a.Length - 1, j = b.Length - 1, carry = 0;
    while (i >= 0 || j >= 0 || carry > 0) {
        int sum = carry;
        if (i >= 0) sum += a[i--] - '0';
        if (j >= 0) sum += b[j--] - '0';
        sb.Append(sum % 2);
        carry = sum / 2;
    }
    char[] arr = sb.ToString().ToCharArray();
    Array.Reverse(arr);
    return new string(arr);
}`,time:"O(max(M,N))",space:"O(max(M,N))"
},{
  id:71,title:"Simplify Path",difficulty:"Medium",topics:["String","Stack"],
  desc:"給一個 Unix 絕對路徑字串，化簡為最短等效路徑。'.' 代表當前目錄，'..' 代表上一層目錄，多個連續 '/' 視為一個。",
  strat:`<ul><li>用 '/' 切割路徑，過濾空字串和 '.'</li><li>遇到 '..' 且 Stack 非空則 Pop（回上層）；否則直接忽略</li><li>其他情況 Push 到 Stack</li><li>最後將 Stack 元素從底到頂用 '/' 連接，前綴加 '/'</li></ul>`,
  code:`public string SimplifyPath(string path) {
    var stack = new Stack<string>();
    foreach (string part in path.Split('/')) {
        if (part == "" || part == ".") continue;
        if (part == "..") { if (stack.Count > 0) stack.Pop(); }
        else stack.Push(part);
    }
    var parts = stack.ToArray();
    Array.Reverse(parts);
    return "/" + string.Join("/", parts);
}`,time:"O(N)",space:"O(N)"
},{
  id:72,title:"Edit Distance",difficulty:"Medium",topics:["DP"],
  desc:"給兩個字串 word1 和 word2，計算將 word1 轉換為 word2 所需的最少操作次數（插入、刪除、替換各算一次）。",
  strat:`<ul><li>DP：dp[i][j] = word1 前 i 個字符轉換為 word2 前 j 個字符的最少操作數</li><li>若 word1[i-1] == word2[j-1]，dp[i][j] = dp[i-1][j-1]</li><li>否則 dp[i][j] = 1 + min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1])（刪、插、換）</li></ul>`,
  code:`public int MinDistance(string word1, string word2) {
    int m = word1.Length, n = word2.Length;
    int[,] dp = new int[m + 1, n + 1];
    for (int i = 0; i <= m; i++) dp[i, 0] = i;
    for (int j = 0; j <= n; j++) dp[0, j] = j;
    for (int i = 1; i <= m; i++)
        for (int j = 1; j <= n; j++) {
            if (word1[i-1] == word2[j-1])
                dp[i,j] = dp[i-1,j-1];
            else
                dp[i,j] = 1 + Math.Min(dp[i-1,j],
                               Math.Min(dp[i,j-1], dp[i-1,j-1]));
        }
    return dp[m, n];
}`,time:"O(M×N)",space:"O(M×N)"
},{
  id:74,title:"Search a 2D Matrix",difficulty:"Medium",topics:["Binary Search","Array"],
  desc:"在一個 m×n 矩陣中搜尋目標值。矩陣每行從左到右遞增，每行第一個數大於上一行最後一個數（可視為一個有序陣列）。",
  strat:`<ul><li>將整個矩陣看成一個有序陣列，用二分搜尋</li><li>mid 對應矩陣位置：row = mid / n，col = mid % n</li><li>比較 matrix[row][col] 與 target，決定往左或往右</li></ul>`,
  code:`public bool SearchMatrix(int[][] matrix, int target) {
    int m = matrix.Length, n = matrix[0].Length;
    int left = 0, right = m * n - 1;
    while (left <= right) {
        int mid = (left + right) / 2;
        int val = matrix[mid / n][mid % n];
        if (val == target) return true;
        if (val < target)  left  = mid + 1;
        else               right = mid - 1;
    }
    return false;
}`,time:"O(log(M×N))",space:"O(1)"
},{
  id:79,title:"Word Search",difficulty:"Medium",topics:["Backtracking","Array"],
  desc:"給一個字符二維網格和一個字串 word，判斷 word 是否存在於網格中（由相鄰格子的字母組成，不可重複使用同一格）。",
  strat:`<ul><li>DFS + 回溯：對每個格子嘗試作為起點</li><li>遞歸中：若超出邊界、已訪問或字符不匹配則返回 false</li><li>標記已訪問（暫時改為 '#'），遞歸完後復原</li><li>到達 word 末尾返回 true</li></ul>`,
  code:`public bool Exist(char[][] board, string word) {
    int m = board.Length, n = board[0].Length;
    bool Dfs(int r, int c, int k) {
        if (k == word.Length) return true;
        if (r < 0 || r >= m || c < 0 || c >= n || board[r][c] != word[k])
            return false;
        char tmp = board[r][c]; board[r][c] = '#';
        bool found = Dfs(r+1,c,k+1)||Dfs(r-1,c,k+1)||
                     Dfs(r,c+1,k+1)||Dfs(r,c-1,k+1);
        board[r][c] = tmp;
        return found;
    }
    for (int r = 0; r < m; r++)
        for (int c = 0; c < n; c++)
            if (Dfs(r, c, 0)) return true;
    return false;
}`,time:"O(M×N×4^L)",space:"O(L)"
},{
  id:105,title:"Construct Binary Tree from Preorder and Inorder Traversal",difficulty:"Medium",topics:["Tree"],
  desc:"給前序遍歷和中序遍歷的結果，重建二叉樹。",
  strat:`<ul><li>前序第一個元素是根節點</li><li>在中序中找到根節點的位置，左側為左子樹，右側為右子樹</li><li>遞歸建立左右子樹；用 Dictionary 存中序索引加速查找</li></ul>`,
  code:`public TreeNode BuildTree(int[] preorder, int[] inorder) {
    var map = new Dictionary<int,int>();
    for (int i = 0; i < inorder.Length; i++) map[inorder[i]] = i;
    int preIdx = 0;
    TreeNode Build(int left, int right) {
        if (left > right) return null;
        int rootVal = preorder[preIdx++];
        var node = new TreeNode(rootVal);
        int mid = map[rootVal];
        node.left  = Build(left, mid - 1);
        node.right = Build(mid + 1, right);
        return node;
    }
    return Build(0, inorder.Length - 1);
}`,time:"O(N)",space:"O(N)"
},{
  id:114,title:"Flatten Binary Tree to Linked List",difficulty:"Medium",topics:["Tree","Linked List"],
  desc:"將二叉樹原地展平為一個「右側連結串列」（按前序遍歷順序），左指針全設為 null。",
  strat:`<ul><li>Morris 展平：對每個有左子樹的節點，找左子樹最右節點，將右子樹接到其後</li><li>把左子樹移到右邊，左指針設為 null，繼續往右走</li><li>也可遞歸後序：先展平右，再展平左，左子樹右移</li></ul>`,
  code:`public void Flatten(TreeNode root) {
    TreeNode cur = root;
    while (cur != null) {
        if (cur.left != null) {
            // 找左子樹最右節點
            TreeNode prev = cur.left;
            while (prev.right != null) prev = prev.right;
            // 接上原本的右子樹
            prev.right = cur.right;
            cur.right  = cur.left;
            cur.left   = null;
        }
        cur = cur.right;
    }
}`,time:"O(N)",space:"O(1)"
},{
  id:121,title:"Best Time to Buy and Sell Stock",difficulty:"Easy",topics:["Array"],
  desc:"給一個股票每日價格陣列，只能買賣一次，求最大利潤。必須先買後賣。",
  strat:`<ul><li>一次遍歷：維護 minPrice（目前最低買入價）和 maxProfit</li><li>每天更新 minPrice = min(minPrice, price)</li><li>更新 maxProfit = max(maxProfit, price - minPrice)</li></ul>`,
  code:`public int MaxProfit(int[] prices) {
    int minPrice = int.MaxValue, maxProfit = 0;
    foreach (int price in prices) {
        minPrice   = Math.Min(minPrice, price);
        maxProfit  = Math.Max(maxProfit, price - minPrice);
    }
    return maxProfit;
}`,time:"O(N)",space:"O(1)"
},{
  id:122,title:"Best Time to Buy and Sell Stock II",difficulty:"Medium",topics:["Array"],
  desc:"給一個股票每日價格陣列，可以進行多次買賣（持有時不能再買），求最大利潤。",
  strat:`<ul><li>貪心：只要明天比今天貴，今天就買明天賣</li><li>遍歷相鄰兩天，若 prices[i+1] > prices[i]，累加差值</li><li>等同於捕捉所有上漲區間的利潤</li></ul>`,
  code:`public int MaxProfit(int[] prices) {
    int profit = 0;
    for (int i = 1; i < prices.Length; i++)
        if (prices[i] > prices[i-1])
            profit += prices[i] - prices[i-1];
    return profit;
}`,time:"O(N)",space:"O(1)"
},{
  id:127,title:"Word Ladder",difficulty:"Hard",topics:["Graph"],
  desc:"給起始單詞 beginWord、目標單詞 endWord 和字典 wordList，每次只能改變一個字母且改變後的單詞必須在字典中，求最短轉換序列的長度。",
  strat:`<ul><li>BFS 最短路徑：每層代表一次轉換</li><li>對當前單詞枚舉每個位置的 26 個字母替換，若在字典中則加入下一層</li><li>從字典中移除已訪問單詞避免重複；到達 endWord 時返回步數</li></ul>`,
  code:`public int LadderLength(string beginWord, string endWord,
    IList<string> wordList) {
    var wordSet = new HashSet<string>(wordList);
    if (!wordSet.Contains(endWord)) return 0;
    var queue = new Queue<string>();
    queue.Enqueue(beginWord);
    int steps = 1;
    while (queue.Count > 0) {
        int size = queue.Count;
        for (int i = 0; i < size; i++) {
            char[] arr = queue.Dequeue().ToCharArray();
            for (int j = 0; j < arr.Length; j++) {
                char orig = arr[j];
                for (char c = 'a'; c <= 'z'; c++) {
                    if (c == orig) continue;
                    arr[j] = c;
                    string next = new string(arr);
                    if (next == endWord) return steps + 1;
                    if (wordSet.Remove(next)) queue.Enqueue(next);
                }
                arr[j] = orig;
            }
        }
        steps++;
    }
    return 0;
}`,time:"O(M²×N)",space:"O(M×N)"
},{
  id:128,title:"Longest Consecutive Sequence",difficulty:"Medium",topics:["Hash Table","Array"],
  desc:"給一個未排序的整數陣列，找出最長連續整數序列的長度。要求 O(N) 時間複雜度。",
  strat:`<ul><li>將所有數放入 HashSet</li><li>對每個數，只有當 num-1 不在 set 中時，才開始計算連續序列（即 num 是序列起點）</li><li>從 num 開始往後找 num+1, num+2... 直到中斷，記錄最大長度</li></ul>`,
  code:`public int LongestConsecutive(int[] nums) {
    var set = new HashSet<int>(nums);
    int maxLen = 0;
    foreach (int num in set) {
        if (set.Contains(num - 1)) continue; // 只從序列起點開始
        int cur = num, len = 1;
        while (set.Contains(cur + 1)) { cur++; len++; }
        maxLen = Math.Max(maxLen, len);
    }
    return maxLen;
}`,time:"O(N)",space:"O(N)"
},{
  id:129,title:"Sum Root to Leaf Numbers",difficulty:"Medium",topics:["Tree"],
  desc:"給一棵二叉樹，每個節點含 0-9 的數字，每條根到葉子的路徑代表一個數字，返回所有路徑數字的總和。",
  strat:`<ul><li>DFS：遞歸時將當前路徑數字傳下去（cur = cur * 10 + node.val）</li><li>到達葉子節點（left == null && right == null）時，將 cur 加入總和</li></ul>`,
  code:`public int SumNumbers(TreeNode root) {
    return Dfs(root, 0);
}
int Dfs(TreeNode node, int cur) {
    if (node == null) return 0;
    cur = cur * 10 + node.val;
    if (node.left == null && node.right == null) return cur;
    return Dfs(node.left, cur) + Dfs(node.right, cur);
}`,time:"O(N)",space:"O(N)"
},{
  id:133,title:"Clone Graph",difficulty:"Medium",topics:["Graph"],
  desc:"深拷貝一張無向圖。每個節點含值和鄰居列表，需要複製整張圖的所有節點和邊。",
  strat:`<ul><li>用 Dictionary 記錄原節點 → 克隆節點的映射（避免重複建立和無限循環）</li><li>BFS 或 DFS 遍歷：每次遇到未克隆的節點就建立克隆，再處理其鄰居</li></ul>`,
  code:`public Node CloneGraph(Node node) {
    if (node == null) return null;
    var map = new Dictionary<Node, Node>();
    var queue = new Queue<Node>();
    queue.Enqueue(node);
    map[node] = new Node(node.val);
    while (queue.Count > 0) {
        var cur = queue.Dequeue();
        foreach (var neighbor in cur.neighbors) {
            if (!map.ContainsKey(neighbor)) {
                map[neighbor] = new Node(neighbor.val);
                queue.Enqueue(neighbor);
            }
            map[cur].neighbors.Add(map[neighbor]);
        }
    }
    return map[node];
}`,time:"O(N+E)",space:"O(N)"
},{
  id:136,title:"Single Number",difficulty:"Easy",topics:["Bit"],
  desc:"給一個整數陣列，除了一個數出現一次外，其餘都出現兩次，找出只出現一次的數。要求 O(N) 時間、O(1) 空間。",
  strat:`<ul><li>XOR 運算：相同的數 XOR 結果為 0，任何數 XOR 0 等於本身</li><li>將所有數 XOR 在一起，成對的數會互相消除，剩下的就是答案</li></ul>`,
  code:`public int SingleNumber(int[] nums) {
    int result = 0;
    foreach (int num in nums) result ^= num;
    return result;
}`,time:"O(N)",space:"O(1)"
},{
  id:137,title:"Single Number II",difficulty:"Medium",topics:["Bit"],
  desc:"給一個整數陣列，除了一個數出現一次外，其餘都出現三次，找出只出現一次的數。要求 O(N) 時間、O(1) 空間。",
  strat:`<ul><li>位元計數：對每個 bit 位，統計所有數字在該位的 1 的個數</li><li>對 3 取模，結果即為只出現一次的數在該位的值</li><li>也可用 ones/twos 兩個變量追蹤出現 1 次和 2 次的位</li></ul>`,
  code:`public int SingleNumber(int[] nums) {
    int ones = 0, twos = 0;
    foreach (int num in nums) {
        ones = (ones ^ num) & ~twos;
        twos = (twos ^ num) & ~ones;
    }
    return ones;
}`,time:"O(N)",space:"O(1)"
},{
  id:150,title:"Evaluate Reverse Polish Notation",difficulty:"Medium",topics:["Stack","Math"],
  desc:"計算以逆波蘭式（後綴表示法）給出的算術表達式。運算符包含 +、-、*、/（整數除法向零截斷）。",
  strat:`<ul><li>用 Stack：遇到數字 push；遇到運算符 pop 兩個數做運算再 push 結果</li><li>注意除法順序：先 pop 的是 b（右），後 pop 的是 a（左），算 a op b</li></ul>`,
  code:`public int EvalRPN(string[] tokens) {
    var stack = new Stack<int>();
    foreach (string t in tokens) {
        if (int.TryParse(t, out int num)) { stack.Push(num); continue; }
        int b = stack.Pop(), a = stack.Pop();
        stack.Push(t switch {
            "+" => a + b,
            "-" => a - b,
            "*" => a * b,
            "/" => a / b,
            _   => 0
        });
    }
    return stack.Pop();
}`,time:"O(N)",space:"O(N)"
}
];

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
const today = new Date().toDateString();
if (localStorage.getItem('lc_date') !== today) {
  localStorage.setItem('lc_date', today);
  localStorage.setItem('lc_seen', '[]');
}
const ST = {
  all: [...PROBLEMS].sort((a,b) => a.id - b.id),
  filtered: [],
  idx: 0,
  showBack: false,
  seen: new Set(JSON.parse(localStorage.getItem('lc_seen') || '[]')),
  fam: JSON.parse(localStorage.getItem('lc_fam') || '{}'),
  todayOnly: false
};

function save() {
  localStorage.setItem('lc_seen', JSON.stringify([...ST.seen]));
  localStorage.setItem('lc_fam',  JSON.stringify(ST.fam));
}

// ═══════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════
function dc(d) { return d === 'Easy' ? 'easy' : d === 'Hard' ? 'hard' : 'medium'; }

function stars(id) {
  const v = ST.fam[id] || 0;
  return [1,2,3,4,5].map(i => `<span class="star ${i<=v?'on':''}"">★</span>`).join('');
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function hl(code) {
  let h = esc(code);
  // comments first
  h = h.replace(/(\/\/[^\n]*)/g, '<span class="cm">$1</span>');
  // keywords
  h = h.replace(/\b(public|private|void|int|bool|string|char|var|new|return|if|else|while|for|foreach|in|true|false|null|class|static)\b/g, '<span class="kw">$1</span>');
  // numbers
  h = h.replace(/\b(\d+)\b/g, '<span class="nm">$1</span>');
  return h;
}

// ═══════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════
function renderFront(p) {
  const seen = ST.seen.has(p.id);
  return `
    <div class="card-header">
      <div>
        <div class="card-id">#${p.id}</div>
        <div class="card-title">${p.title}</div>
        <div class="tags">
          <span class="tag ${dc(p.difficulty)}">${p.difficulty}</span>
          ${p.topics.map(t=>`<span class="tag topic">${t}</span>`).join('')}
          <span class="tag seen-tag ${seen?'show':''}">✓ 今日已看</span>
        </div>
      </div>
      <div class="fam-stars">${stars(p.id)}</div>
    </div>
    <div class="divider"></div>
    <div class="desc-label">📋 題目描述</div>
    <div class="desc-text">${p.desc}</div>
    <div class="flip-hint">👆 點擊翻面 / 按 Space 查看解法</div>
  `;
}

function renderBack(p) {
  return `
    <div class="section">
      <div class="slabel">💡 解題思路</div>
      <div class="strat">${p.strat}</div>
    </div>
    <div class="section">
      <div class="slabel">💻 C# 程式碼</div>
      <div class="codebox">
        <div class="codehdr">
          <span class="codelang">C#</span>
          <button class="copybtn" onclick="copyCode()">📋 複製</button>
        </div>
        <pre><code>${hl(p.code)}</code></pre>
      </div>
    </div>
    <div class="section">
      <div class="slabel">⏱ 複雜度</div>
      <table class="cxtable">
        <thead><tr><th>維度</th><th>複雜度</th></tr></thead>
        <tbody>
          <tr><td class="tdlabel">時間 Time</td><td>${p.time}</td></tr>
          <tr><td class="tdlabel">空間 Space</td><td>${p.space}</td></tr>
        </tbody>
      </table>
    </div>
  `;
}

window.copyCode = function() {
  const p = ST.filtered[ST.idx];
  if (!p) return;
  navigator.clipboard.writeText(p.code).then(() => {
    const btn = document.querySelector('.copybtn');
    if (btn) { btn.textContent = '✓ 已複製'; setTimeout(()=>btn.textContent='📋 複製',2000); }
  });
};

// ═══════════════════════════════════════════
//  SHOW PROBLEM
// ═══════════════════════════════════════════
function show(idx) {
  if (!ST.filtered.length) {
    document.getElementById('cardFront').innerHTML = '<div style="color:var(--dim);text-align:center;padding:40px">沒有符合的題目</div>';
    document.getElementById('cardBack').innerHTML = '';
    return;
  }
  ST.idx = Math.max(0, Math.min(idx, ST.filtered.length - 1));
  ST.showBack = false;

  // Switch to front
  document.getElementById('cardFront').classList.add('visible');
  document.getElementById('cardBack').classList.remove('visible');
  document.getElementById('flipBtn').textContent = '🔄 翻面看解法';

  const p = ST.filtered[ST.idx];
  document.getElementById('cardFront').innerHTML = renderFront(p);
  document.getElementById('cardBack').innerHTML  = renderBack(p);

  // Sidebar
  document.querySelectorAll('.pitem').forEach(el => {
    el.classList.toggle('active', +el.dataset.id === p.id);
  });
  document.querySelector('.pitem.active')?.scrollIntoView({block:'nearest'});

  // Controls
  document.getElementById('prevBtn').disabled = ST.idx === 0;
  document.getElementById('nextBtn').disabled = ST.idx === ST.filtered.length - 1;
  document.getElementById('counter').textContent = `${ST.idx+1} / ${ST.filtered.length}`;

  const seen = ST.seen.has(p.id);
  const sb = document.getElementById('seenBtn');
  sb.textContent = seen ? '✓ 今日已看' : '○ 今日已看';
  sb.classList.toggle('on', seen);

  const fv = ST.fam[p.id] || 0;
  document.querySelectorAll('.fambtn').forEach(b => {
    b.classList.toggle('sel', +b.dataset.lv === fv);
  });
}

function flip() {
  ST.showBack = !ST.showBack;
  document.getElementById('cardFront').classList.toggle('visible', !ST.showBack);
  document.getElementById('cardBack').classList.toggle('visible',   ST.showBack);
  document.getElementById('flipBtn').textContent = ST.showBack ? '🔄 看題目' : '🔄 翻面看解法';
}

// ═══════════════════════════════════════════
//  SIDEBAR
// ═══════════════════════════════════════════
function renderSidebar() {
  document.getElementById('sbList').innerHTML = ST.filtered.map((p, i) => {
    const seen = ST.seen.has(p.id);
    const col = p.difficulty === 'Easy' ? 'var(--green)' : p.difficulty === 'Hard' ? 'var(--red)' : 'var(--yellow)';
    return `<div class="pitem ${seen?'seen':''}" data-id="${p.id}" onclick="show(${i})">
      <span class="pnum">#${p.id}</span>
      <span class="ptitle">${p.title}</span>
      <span class="sdot2"></span>
      <span class="ddot" style="background:${col}"></span>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════
//  STATS + TODAY
// ═══════════════════════════════════════════
function updateStats() {
  const total = ST.filtered.length;
  const seen  = ST.filtered.filter(p => ST.seen.has(p.id)).length;
  const fam4  = Object.values(ST.fam).filter(v => v >= 4).length;
  const pct   = total ? Math.round(seen/total*100) : 0;
  document.getElementById('s1').textContent = total + ' 題';
  document.getElementById('s2').textContent = '今日 ' + seen;
  document.getElementById('s3').textContent = '熟練 ' + fam4;
  document.getElementById('pf').style.width  = pct + '%';
  document.getElementById('pct').textContent = pct + '%';
}

function renderToday() {
  const chips = document.getElementById('todayChips');
  if (!ST.seen.size) {
    chips.innerHTML = '<span class="today-empty">還沒有紀錄，開始刷題吧！</span>'; return;
  }
  chips.innerHTML = [...ST.seen].map(id => {
    return `<div class="tchip" onclick="jumpTo(${id})">
      #${id}<span class="tremove" onclick="removeSeen(event,${id})">×</span>
    </div>`;
  }).join('');
}

window.jumpTo = function(id) {
  const i = ST.filtered.findIndex(p => p.id === id);
  if (i >= 0) show(i);
};
window.removeSeen = function(e, id) {
  e.stopPropagation();
  ST.seen.delete(id); save(); renderToday(); updateStats(); renderSidebar();
  const cur = ST.filtered[ST.idx];
  if (cur?.id === id) document.getElementById('cardFront').innerHTML = renderFront(cur);
};

// ═══════════════════════════════════════════
//  FILTERS
// ═══════════════════════════════════════════
function applyFilters() {
  const topic = document.getElementById('topicSel').value;
  const diff  = document.getElementById('diffSel').value;
  const q     = document.getElementById('searchBox').value.toLowerCase();
  ST.filtered = ST.all.filter(p => {
    if (topic !== 'all' && !p.topics.includes(topic)) return false;
    if (diff  !== 'all' && p.difficulty !== diff)     return false;
    if (q && !p.title.toLowerCase().includes(q) && !String(p.id).includes(q)) return false;
    if (ST.todayOnly && !ST.seen.has(p.id)) return false;
    return true;
  });
  renderSidebar(); show(0); updateStats();
}

// ═══════════════════════════════════════════
//  EVENTS
// ═══════════════════════════════════════════
document.getElementById('flipBtn').addEventListener('click', flip);
document.getElementById('cardFront').addEventListener('click', flip);
document.getElementById('cardBack').addEventListener('click', function(e) {
  // only flip if clicking non-interactive areas
  if (e.target.tagName === 'BUTTON' || e.target.closest('button')) return;
  flip();
});

document.getElementById('prevBtn').addEventListener('click', () => show(ST.idx - 1));
document.getElementById('nextBtn').addEventListener('click', () => show(ST.idx + 1));

document.getElementById('seenBtn').addEventListener('click', () => {
  const p = ST.filtered[ST.idx]; if (!p) return;
  if (ST.seen.has(p.id)) ST.seen.delete(p.id); else ST.seen.add(p.id);
  save(); renderToday(); updateStats(); renderSidebar();
  const seen = ST.seen.has(p.id);
  document.getElementById('seenBtn').textContent = seen ? '✓ 今日已看' : '○ 今日已看';
  document.getElementById('seenBtn').classList.toggle('on', seen);
  document.getElementById('cardFront').innerHTML = renderFront(p);
});

document.querySelectorAll('.fambtn').forEach(btn => {
  btn.addEventListener('click', () => {
    const p = ST.filtered[ST.idx]; if (!p) return;
    const lv = +btn.dataset.lv;
    ST.fam[p.id] = lv; save();
    document.querySelectorAll('.fambtn').forEach(b => b.classList.toggle('sel', +b.dataset.lv === lv));
    document.getElementById('cardFront').innerHTML = renderFront(p);
    updateStats();
  });
});

document.getElementById('topicSel').addEventListener('change', applyFilters);
document.getElementById('diffSel').addEventListener('change', applyFilters);
document.getElementById('searchBox').addEventListener('input', applyFilters);
document.getElementById('todayBtn').addEventListener('click', () => {
  ST.todayOnly = !ST.todayOnly;
  document.getElementById('todayBtn').classList.toggle('on', ST.todayOnly);
  applyFilters();
});
document.getElementById('clearBtn').addEventListener('click', () => {
  if (!confirm('清除今日紀錄？')) return;
  ST.seen.clear(); save(); renderToday(); updateStats(); renderSidebar();
  const p = ST.filtered[ST.idx];
  if (p) document.getElementById('cardFront').innerHTML = renderFront(p);
});

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flip(); }
  if (e.key === 'ArrowLeft')  show(ST.idx - 1);
  if (e.key === 'ArrowRight') show(ST.idx + 1);
});

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
applyFilters();
renderToday();
</script>
</body>
</html>
