<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeetCode 解題筆記</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1f2937;
    --border: #30363d;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --accent3: #d29922;
    --accent4: #f85149;
    --accent5: #bc8cff;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --text-dim: #484f58;
    --easy: #3fb950;
    --medium: #d29922;
    --hard: #f85149;
    --card-h: 480px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 0;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: -0.5px;
    white-space: nowrap;
  }

  .logo span { color: var(--text-muted); font-weight: 400; }

  .header-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    flex: 1;
    justify-content: flex-end;
  }

  select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }

  select:focus { outline: none; border-color: var(--accent); }

  .btn {
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }

  /* ── Stats bar ── */
  .stats-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: flex;
    gap: 20px;
    align-items: center;
    flex-wrap: wrap;
  }

  .stat-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .stat-chip .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }

  .progress-bar {
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
    width: 120px;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent5));
    border-radius: 2px;
    transition: width 0.3s;
  }

  /* ── Main layout ── */
  main {
    display: flex;
    gap: 20px;
    padding: 24px;
    max-width: 1200px;
    margin: 0 auto;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 260px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .sidebar-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 4px 8px;
  }

  .problem-list {
    display: flex;
    flex-direction: column;
    gap: 2px;
    max-height: calc(100vh - 220px);
    overflow-y: auto;
    padding-right: 4px;
  }

  .problem-list::-webkit-scrollbar { width: 4px; }
  .problem-list::-webkit-scrollbar-track { background: transparent; }
  .problem-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .problem-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.1s;
    border: 1px solid transparent;
  }

  .problem-item:hover { background: var(--surface2); }
  .problem-item.active { background: var(--surface2); border-color: var(--accent); }

  .problem-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    min-width: 36px;
  }

  .problem-title {
    font-size: 12px;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .difficulty-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .seen-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent2);
    flex-shrink: 0;
    opacity: 0;
  }

  .problem-item.seen .seen-dot { opacity: 1; }

  /* ── Card area ── */
  .card-area {
    flex: 1;
    min-width: 0;
  }

  /* ── Flashcard ── */
  .flashcard-wrapper {
    perspective: 1200px;
    height: var(--card-h);
    margin-bottom: 16px;
  }

  .flashcard {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .flashcard.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .card-back {
    transform: rotateY(180deg);
    overflow-y: auto;
  }

  .card-back::-webkit-scrollbar { width: 4px; }
  .card-back::-webkit-scrollbar-track { background: transparent; }
  .card-back::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Front card */
  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 20px;
    gap: 12px;
  }

  .card-meta {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .problem-id {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
  }

  .problem-name {
    font-size: 22px;
    font-weight: 700;
    line-height: 1.3;
  }

  .tags-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 4px;
  }

  .tag {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    border: 1px solid;
  }

  .tag.easy { color: var(--easy); border-color: var(--easy); background: rgba(63,185,80,0.1); }
  .tag.medium { color: var(--medium); border-color: var(--medium); background: rgba(210,153,34,0.1); }
  .tag.hard { color: var(--hard); border-color: var(--hard); background: rgba(248,81,73,0.1); }
  .tag.topic { color: var(--accent5); border-color: var(--accent5); background: rgba(188,140,255,0.1); }

  .card-badges {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
    flex-shrink: 0;
  }

  .familiarity-display {
    display: flex;
    gap: 4px;
  }

  .fam-star {
    font-size: 16px;
    color: var(--text-dim);
    transition: color 0.2s;
  }

  .fam-star.filled { color: var(--accent3); }

  .seen-badge {
    padding: 3px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 600;
    background: rgba(63,185,80,0.15);
    color: var(--accent2);
    border: 1px solid var(--accent2);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .seen-badge.visible { opacity: 1; }

  .card-description {
    flex: 1;
    font-size: 15px;
    line-height: 1.8;
    color: var(--text);
    overflow-y: auto;
    padding-right: 4px;
  }

  .card-description::-webkit-scrollbar { width: 4px; }
  .card-description::-webkit-scrollbar-track { background: transparent; }
  .card-description::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .card-description p { margin-bottom: 10px; }

  .flip-hint {
    text-align: center;
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .flip-hint::before, .flip-hint::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Back card sections */
  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .strategy-block {
    margin-bottom: 24px;
  }

  .strategy-text {
    font-size: 14px;
    line-height: 1.8;
    color: var(--text);
  }

  .strategy-text ul {
    list-style: none;
    padding-left: 0;
  }

  .strategy-text li {
    padding: 4px 0 4px 20px;
    position: relative;
  }

  .strategy-text li::before {
    content: '▸';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-size: 11px;
    top: 6px;
  }

  /* Code block */
  .code-block {
    background: #0d1117;
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 24px;
    overflow: hidden;
  }

  .code-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  .code-lang {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent5);
    font-weight: 600;
  }

  .copy-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 3px 8px;
    border-radius: 5px;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }

  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }

  pre {
    padding: 16px;
    overflow-x: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    line-height: 1.7;
    color: #e6edf3;
    white-space: pre;
  }

  pre .kw { color: #ff7b72; }
  pre .type { color: #ffa657; }
  pre .str { color: #a5d6ff; }
  pre .comment { color: #8b949e; }
  pre .num { color: #79c0ff; }

  /* Complexity table */
  .complexity-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    margin-bottom: 24px;
    border-radius: 8px;
    overflow: hidden;
  }

  .complexity-table th {
    background: var(--surface2);
    padding: 10px 16px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
  }

  .complexity-table td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent2);
    font-weight: 600;
  }

  .complexity-table tr:last-child td { border-bottom: none; }

  /* ── Controls ── */
  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }

  .control-group {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .nav-btn {
    width: 40px; height: 40px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 16px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .flip-btn {
    padding: 10px 20px;
    border-radius: 10px;
    background: var(--accent);
    border: none;
    color: #000;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    flex: 1;
  }

  .flip-btn:hover { filter: brightness(1.15); }

  .mark-seen-btn {
    padding: 10px 16px;
    border-radius: 10px;
    border: 1px solid var(--accent2);
    background: rgba(63,185,80,0.1);
    color: var(--accent2);
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    white-space: nowrap;
  }

  .mark-seen-btn:hover { background: rgba(63,185,80,0.2); }
  .mark-seen-btn.marked { background: var(--accent2); color: #000; }

  /* Familiarity picker */
  .familiarity-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 8px;
  }

  .fam-label {
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .fam-buttons {
    display: flex;
    gap: 6px;
  }

  .fam-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-muted);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }

  .fam-btn:hover { border-color: var(--accent3); }
  .fam-btn[data-level="1"].selected { background: rgba(248,81,73,0.2); border-color: var(--accent4); color: var(--accent4); }
  .fam-btn[data-level="2"].selected { background: rgba(210,153,34,0.2); border-color: var(--accent3); color: var(--accent3); }
  .fam-btn[data-level="3"].selected { background: rgba(88,166,255,0.2); border-color: var(--accent); color: var(--accent); }
  .fam-btn[data-level="4"].selected { background: rgba(63,185,80,0.2); border-color: var(--accent2); color: var(--accent2); }
  .fam-btn[data-level="5"].selected { background: rgba(188,140,255,0.2); border-color: var(--accent5); color: var(--accent5); }

  /* ── Today panel ── */
  .today-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    margin-top: 20px;
  }

  .today-title {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .today-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .today-chip {
    padding: 4px 10px;
    border-radius: 20px;
    background: rgba(88,166,255,0.1);
    border: 1px solid rgba(88,166,255,0.3);
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
  }

  .today-chip:hover { background: rgba(88,166,255,0.2); }
  .today-chip .remove { color: var(--text-muted); font-size: 14px; line-height: 1; }

  .today-empty {
    font-size: 12px;
    color: var(--text-dim);
    font-style: italic;
  }

  /* Loading spinner */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 16px;
  }

  .spinner {
    width: 36px; height: 36px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text { font-size: 13px; color: var(--text-muted); }

  /* Counter */
  .counter {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    padding: 8px 14px;
    background: var(--surface2);
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  /* Responsive */
  @media (max-width: 768px) {
    main { flex-direction: column; padding: 12px; }
    .sidebar { width: 100%; }
    .problem-list { max-height: 200px; flex-direction: row; flex-wrap: wrap; overflow-y: auto; }
    .problem-item { width: calc(50% - 4px); }
    .flashcard-wrapper { --card-h: auto; min-height: 420px; }
  }

  /* Search */
  .search-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 13px;
    font-family: inherit;
    width: 160px;
    transition: border-color 0.15s;
  }

  .search-box:focus { outline: none; border-color: var(--accent); }
  .search-box::placeholder { color: var(--text-dim); }

  /* AI badge */
  .ai-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 600;
    background: rgba(188,140,255,0.15);
    border: 1px solid rgba(188,140,255,0.3);
    color: var(--accent5);
  }
</style>
</head>
<body>

<header>
  <div class="logo">LC<span>.notes</span></div>
  <div class="header-controls">
    <input type="text" class="search-box" placeholder="搜尋題號或題名..." id="searchBox" />
    <select id="topicFilter">
      <option value="all">全部主題</option>
      <option value="String">字串 String</option>
      <option value="Array">陣列 Array</option>
      <option value="Tree">樹 Tree</option>
      <option value="Graph">圖 Graph</option>
      <option value="Linked List">鏈結串列</option>
      <option value="DP">動態規劃 DP</option>
      <option value="Interval">區間 Interval</option>
      <option value="Trie">Trie</option>
      <option value="Design">設計 Design</option>
      <option value="Binary Search">二元搜尋</option>
      <option value="Two Pointers">雙指針</option>
      <option value="Sliding Window">滑動窗口</option>
      <option value="Math">數學</option>
      <option value="Bit">位元操作</option>
      <option value="Backtracking">回溯</option>
      <option value="Stack">Stack</option>
      <option value="Heap">Heap</option>
      <option value="Hash Table">Hash Table</option>
    </select>
    <select id="diffFilter">
      <option value="all">所有難度</option>
      <option value="Easy">Easy</option>
      <option value="Medium">Medium</option>
      <option value="Hard">Hard</option>
    </select>
    <button class="btn" id="todayOnlyBtn">📅 今日</button>
  </div>
</header>

<div class="stats-bar">
  <div class="stat-chip">
    <div class="dot" style="background:var(--accent)"></div>
    <span id="totalStat">0 題</span>
  </div>
  <div class="stat-chip">
    <div class="dot" style="background:var(--accent2)"></div>
    <span id="seenStat">今日已看 0 題</span>
  </div>
  <div class="stat-chip">
    <div class="dot" style="background:var(--accent3)"></div>
    <span id="familiarStat">熟練 0 題</span>
  </div>
  <div class="progress-bar" style="margin-left: auto;">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
  <span style="font-size:12px;color:var(--text-muted)" id="progressLabel">0%</span>
</div>

<main>
  <div class="sidebar">
    <div class="sidebar-title">題目列表</div>
    <div class="problem-list" id="problemList"></div>
  </div>

  <div class="card-area">
    <div class="flashcard-wrapper">
      <div class="flashcard" id="flashcard">
        <!-- Front -->
        <div class="card-face card-front" id="cardFront">
          <div class="loading">
            <div class="spinner"></div>
            <div class="loading-text">載入題目中...</div>
          </div>
        </div>
        <!-- Back -->
        <div class="card-face card-back" id="cardBack">
          <div class="loading">
            <div class="spinner"></div>
            <div class="loading-text">載入解析中...</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <div class="control-group">
        <button class="nav-btn" id="prevBtn" title="上一題">‹</button>
        <button class="nav-btn" id="nextBtn" title="下一題">›</button>
      </div>
      <span class="counter" id="counter">0 / 0</span>
      <button class="flip-btn" id="flipBtn">🔄 翻面看解法</button>
      <button class="mark-seen-btn" id="markSeenBtn">✓ 今日已看</button>
    </div>

    <!-- Familiarity -->

function diffClass(d) {
  return d === 'Easy' ? 'easy' : d === 'Hard' ? 'hard' : 'medium';
}

function renderStars(level) {
  return [1,2,3,4,5].map(i =>
    `<span class="fam-star ${i <= level ? 'filled' : ''}">★</span>`
  ).join('');
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlightCode(code) {
  const keywords = /\b(public|private|void|int|bool|string|char|var|new|return|if|else|while|for|foreach|in|true|false|null|class|static|this|out|ref)\b/g;
  const types = /\b(List|Dictionary|HashSet|Queue|Stack|StringBuilder|Array|TreeNode|ListNode|TrieNode|Trie|Math|IList|String|Tuple|int\[\]|char\[\])\b/g;
  let h = escapeHtml(code);
  h = h.replace(/\/\/.*/g, m => `<span class="comment">${m}</span>`);
  h = h.replace(keywords, m => `<span class="kw">${m}</span>`);
  h = h.replace(/\b\d+\b/g, m => `<span class="num">${m}</span>`);
  return h;
}

async function fetchAIContent(problem) {
  if (state.aiCache[problem.id]) return state.aiCache[problem.id];
  if (problem.hasNotes) return null; // already has data

  const prompt = `你是 LeetCode 解題專家，請用繁體中文提供以下題目的詳細解析。

題目：#${problem.id} ${problem.title}
難度：${problem.difficulty}
主題：${problem.topics.join(', ')}

請用以下 JSON 格式回傳（只回傳 JSON，不要有其他文字）：
{
  "description": "題目描述（繁體中文，2-4句話）",
  "strategy": "<ul><li>解題思路第一點</li><li>解題思路第二點</li><li>解題思路第三點</li></ul>",
  "code": "C# 解法程式碼（完整可執行）",
  "timeComplexity": "O(N)",
  "spaceComplexity": "O(1)"
}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    const text = data.content?.map(b => b.text || '').join('');
    const clean = text.replace(/```json\n?|\n?```/g, '').trim();
    const parsed = JSON.parse(clean);
    state.aiCache[problem.id] = parsed;
    return parsed;
  } catch (e) {
    console.error('AI fetch error:', e);
    return null;
  }
}

  const fam = state.familiarity[problem.id] || 0;
  const seen = state.seenToday.has(problem.id);
  return `
    <div class="card-header">
      <div class="card-meta">
        <div class="problem-id">#${problem.id}</div>
        <div class="problem-name">${problem.title}</div>
        <div class="tags-row">
          <span class="tag ${diffClass(problem.difficulty)}">${problem.difficulty}</span>
          ${problem.topics.map(t => `<span class="tag topic">${t}</span>`).join('')}
          ${!problem.hasNotes ? '<span class="ai-badge">✦ AI</span>' : ''}
        </div>
      </div>
      <div class="card-badges">
        <div class="familiarity-display">${renderStars(fam)}</div>
        <div class="seen-badge ${seen ? 'visible' : ''}">✓ 今日已看</div>
      </div>
    </div>
    <div class="card-description" id="frontDesc">
      ${problem.description
        ? `<p>${problem.description}</p>`
        : `<div class="loading"><div class="spinner"></div><div class="loading-text">AI 生成題目描述中...</div></div>`
      }
    </div>
    <div class="flip-hint">點擊翻面 或 按 Space 鍵 查看解法</div>
  `;
}

function renderBack(problem, aiData) {
  const desc = problem.description || aiData?.description;
  const strategy = problem.strategy || aiData?.strategy;
  const code = problem.code || aiData?.code;
  const timeC = problem.timeComplexity || aiData?.timeComplexity;
  const spaceC = problem.spaceComplexity || aiData?.spaceComplexity;

  if (!strategy && !code) {
    return `<div class="loading"><div class="spinner"></div><div class="loading-text">AI 生成解析中...</div></div>`;
  }

  return `
    ${strategy ? `
    <div class="strategy-block">
      <div class="section-label">💡 解題思路</div>
      <div class="strategy-text">${strategy}</div>
    </div>` : ''}

    ${code ? `
    <div class="section-label">💻 C# 程式碼</div>
    <div class="code-block">
      <div class="code-header">
        <span class="code-lang">C#</span>
        <button class="copy-btn" onclick="copyCode(this)">📋 複製</button>
      </div>
      <pre id="codeBlock${problem.id}"><code>${highlightCode(code)}</code></pre>
    </div>` : ''}

    ${(timeC || spaceC) ? `
    <div class="section-label">⏱ 複雜度分析</div>
    <table class="complexity-table">
      <thead><tr><th>維度</th><th>複雜度</th></tr></thead>
      <tbody>
        ${timeC ? `<tr><td style="color:var(--text-muted);font-family:inherit">時間 Time</td><td>${timeC}</td></tr>` : ''}
        ${spaceC ? `<tr><td style="color:var(--text-muted);font-family:inherit">空間 Space</td><td>${spaceC}</td></tr>` : ''}
      </tbody>
    </table>` : ''}
  `;
}

window.copyCode = function(btn) {
  const problem = state.filtered[state.currentIdx];
  const code = problem.code || state.aiCache[problem.id]?.code || '';
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = '✓ 已複製';
    setTimeout(() => btn.textContent = '📋 複製', 2000);
  });
};

// ─────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────
async function showProblem(idx) {
  if (state.filtered.length === 0) {
    document.getElementById('cardFront').innerHTML = '<div class="loading"><div class="loading-text">沒有符合的題目</div></div>';
    document.getElementById('cardBack').innerHTML = '';
    document.getElementById('counter').textContent = '0 / 0';
    return;
  }

  idx = Math.max(0, Math.min(idx, state.filtered.length - 1));
  state.currentIdx = idx;

  // Reset flip
  if (state.isFlipped) {
    document.getElementById('flashcard').classList.remove('flipped');
    state.isFlipped = false;
    document.getElementById('flipBtn').textContent = '🔄 翻面看解法';
  }

  const problem = state.filtered[idx];

  // Render front immediately
  document.getElementById('cardFront').innerHTML = renderFront(problem);
  document.getElementById('cardBack').innerHTML = renderBack(problem, state.aiCache[problem.id] || null);

  // Update sidebar selection
  document.querySelectorAll('.problem-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.id) === problem.id);
  });

  // Scroll sidebar item into view
  const activeItem = document.querySelector('.problem-item.active');
  if (activeItem) activeItem.scrollIntoView({ block: 'nearest' });

  // Update controls
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === state.filtered.length - 1;
  document.getElementById('counter').textContent = `${idx + 1} / ${state.filtered.length}`;

  const seen = state.seenToday.has(problem.id);
  const seenBtn = document.getElementById('markSeenBtn');
  seenBtn.textContent = seen ? '✓ 今日已看' : '○ 標記今日';
  seenBtn.classList.toggle('marked', seen);

  // Update familiarity buttons
  const fam = state.familiarity[problem.id] || 0;
  document.querySelectorAll('.fam-btn').forEach(btn => {
    btn.classList.toggle('selected', parseInt(btn.dataset.level) === fam);
  });

  // Fetch AI if needed
  if (!problem.hasNotes && !state.aiCache[problem.id]) {
    const aiData = await fetchAIContent(problem);
    if (aiData && state.filtered[state.currentIdx]?.id === problem.id) {
      // Update the problem with AI data
      Object.assign(problem, {
        description: aiData.description,
        strategy: aiData.strategy,
        code: aiData.code,
        timeComplexity: aiData.timeComplexity,
        spaceComplexity: aiData.spaceComplexity,
      });
      // Re-render
      document.getElementById('cardFront').innerHTML = renderFront(problem);
      document.getElementById('cardBack').innerHTML = renderBack(problem, aiData);
    }
  }
}

function flip() {
  state.isFlipped = !state.isFlipped;
  document.getElementById('flashcard').classList.toggle('flipped', state.isFlipped);
  document.getElementById('flipBtn').textContent = state.isFlipped ? '🔄 看題目' : '🔄 翻面看解法';
}

// ─────────────────────────────────────────
// FILTERS
// ─────────────────────────────────────────
function applyFilters() {
  const topic = document.getElementById('topicFilter').value;
  const diff = document.getElementById('diffFilter').value;
  const search = document.getElementById('searchBox').value.toLowerCase();

  state.filtered = PROBLEMS.filter(p => {
    if (topic !== 'all' && !p.topics.includes(topic)) return false;
    if (diff !== 'all' && p.difficulty !== diff) return false;
    if (search && !p.title.toLowerCase().includes(search) && !String(p.id).includes(search)) return false;
    if (state.todayFilter && !state.seenToday.has(p.id)) return false;
    return true;
  });

  renderSidebar();
  showProblem(0);
  updateStats();
}

// ─────────────────────────────────────────
// SIDEBAR
// ─────────────────────────────────────────
function renderSidebar() {
  const list = document.getElementById('problemList');
  list.innerHTML = state.filtered.map((p, i) => {
    const seen = state.seenToday.has(p.id);
    return `<div class="problem-item ${seen ? 'seen' : ''}" data-id="${p.id}" onclick="showProblem(${i})">
      <span class="problem-num">#${p.id}</span>
      <span class="problem-title">${p.title}</span>
      <span class="seen-dot"></span>
      <span class="difficulty-dot" style="background:var(--${diffClass(p.difficulty)})"></span>
    </div>`;
  }).join('');
}

// ─────────────────────────────────────────
// STATS
// ─────────────────────────────────────────
function updateStats() {
  const total = state.filtered.length;
  const seen = state.filtered.filter(p => state.seenToday.has(p.id)).length;
  const famCount = Object.values(state.familiarity).filter(v => v >= 4).length;
  const pct = total ? Math.round((seen / total) * 100) : 0;

  document.getElementById('totalStat').textContent = `${total} 題`;
  document.getElementById('seenStat').textContent = `今日已看 ${seen} 題`;
  document.getElementById('familiarStat').textContent = `熟練 ${famCount} 題`;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = pct + '%';
}

// ─────────────────────────────────────────
// TODAY PANEL
// ─────────────────────────────────────────
function renderTodayPanel() {
  const grid = document.getElementById('todayGrid');
  if (state.seenToday.size === 0) {
    grid.innerHTML = '<span class="today-empty">還沒有紀錄，開始刷題吧！</span>';
    return;
  }
  grid.innerHTML = [...state.seenToday].map(id => {
    const p = PROBLEMS.find(x => x.id === id);
    return `<div class="today-chip" onclick="jumpToId(${id})">
      #${id}
      <span class="remove" onclick="removeSeen(event, ${id})">×</span>
    </div>`;
  }).join('');
}

window.jumpToId = function(id) {
  const idx = state.filtered.findIndex(p => p.id === id);
  if (idx >= 0) showProblem(idx);
};

window.removeSeen = function(e, id) {
  e.stopPropagation();
  state.seenToday.delete(id);
  save();
  renderTodayPanel();
  updateStats();
  renderSidebar();
  // Refresh seen badge if this is current
  const cur = state.filtered[state.currentIdx];
  if (cur?.id === id) {
    const btn = document.getElementById('markSeenBtn');
    btn.textContent = '○ 標記今日';
    btn.classList.remove('marked');
    document.getElementById('cardFront').innerHTML = renderFront(cur);
  }
};

// ─────────────────────────────────────────
// EVENT LISTENERS
// ─────────────────────────────────────────
document.getElementById('flipBtn').addEventListener('click', flip);
document.getElementById('flashcard').addEventListener('click', flip);

document.getElementById('prevBtn').addEventListener('click', () => {
  showProblem(state.currentIdx - 1);
});
document.getElementById('nextBtn').addEventListener('click', () => {
  showProblem(state.currentIdx + 1);
});

document.getElementById('markSeenBtn').addEventListener('click', () => {
  const p = state.filtered[state.currentIdx];
  if (!p) return;
  if (state.seenToday.has(p.id)) {
    state.seenToday.delete(p.id);
  } else {
    state.seenToday.add(p.id);
  }
  save();
  renderTodayPanel();
  updateStats();
  renderSidebar();
  const seen = state.seenToday.has(p.id);
  document.getElementById('markSeenBtn').textContent = seen ? '✓ 今日已看' : '○ 標記今日';
  document.getElementById('markSeenBtn').classList.toggle('marked', seen);
  document.getElementById('cardFront').innerHTML = renderFront(p);
});

document.querySelectorAll('.fam-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const p = state.filtered[state.currentIdx];
    if (!p) return;
    const level = parseInt(btn.dataset.level);
    state.familiarity[p.id] = level;
    save();
    document.querySelectorAll('.fam-btn').forEach(b => {
      b.classList.toggle('selected', parseInt(b.dataset.level) === level);
    });
    document.getElementById('cardFront').innerHTML = renderFront(p);
    updateStats();
  });
});

document.getElementById('topicFilter').addEventListener('change', applyFilters);
document.getElementById('diffFilter').addEventListener('change', applyFilters);
document.getElementById('searchBox').addEventListener('input', applyFilters);

document.getElementById('todayOnlyBtn').addEventListener('click', () => {
  state.todayFilter = !state.todayFilter;
  document.getElementById('todayOnlyBtn').classList.toggle('active', state.todayFilter);
  applyFilters();
});

document.getElementById('clearTodayBtn').addEventListener('click', () => {
  if (confirm('確定要清除今日紀錄嗎？')) {
    state.seenToday = new Set();
    save();
    renderTodayPanel();
    updateStats();
    renderSidebar();
    const p = state.filtered[state.currentIdx];
    if (p) document.getElementById('cardFront').innerHTML = renderFront(p);
  }
});

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flip(); }
  if (e.key === 'ArrowLeft') showProblem(state.currentIdx - 1);
  if (e.key === 'ArrowRight') showProblem(state.currentIdx + 1);
});

// ─────────────────────────────────────────
// INIT
// ─────────────────────────────────────────
applyFilters();
renderTodayPanel();
</script>
</body>
</html>
